      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--color-sidebar-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mp-sidebar__logo {
      width: 36px;
      height: 36px;
      background: var(--color-primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: var(--font-weight-bold);
      font-size: var(--font-size-md);
      flex-shrink: 0;
    }
    .mp-sidebar__brand-text {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: #ffffff;
      letter-spacing: -0.01em;
    }
    .mp-sidebar__brand-sub {
      font-size: var(--font-size-xs);
      color: var(--color-sidebar-text);
    }
    .mp-sidebar__nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .mp-sidebar__item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-sm);
      color: var(--color-sidebar-text);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .mp-sidebar__item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--color-sidebar-text-hover);
    }
    .mp-sidebar__item--active {
      background: var(--color-sidebar-active-bg);
      color: var(--color-sidebar-active-text);
    }
    .mp-sidebar__icon {
      width: 18px;
      height: 18px;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .mp-sidebar__user {
      padding: 16px 20px;
      border-top: 1px solid var(--color-sidebar-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mp-sidebar__avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      flex-shrink: 0;
    }
    .mp-sidebar__user-name {
      font-size: var(--font-size-sm);
      color: #ffffff;
      font-weight: var(--font-weight-medium);
    }
    .mp-sidebar__user-email {
      font-size: var(--font-size-xs);
      color: var(--color-sidebar-text);
    }

    /* Sidebar mini preview (right column) */
    .sidebar-preview-col {
      width: 280px;
      flex-shrink: 0;
      padding: 48px 24px 80px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .sidebar-preview-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      font-weight: var(--font-weight-medium);
    }

    /* Full sidebar section */
    .sidebar-full {
      margin-top: 0;
    }
    .sidebar-full .mp-sidebar {
      width: 240px;
    }

    /* Input layout */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .input-full {
      grid-column: 1 / -1;
    }

    /* SVG icon helper */
    .icon-svg {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: middle;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .sidebar-preview-col { display: none; }
      .content-area { padding: 32px 24px 64px; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</body>
</html>
