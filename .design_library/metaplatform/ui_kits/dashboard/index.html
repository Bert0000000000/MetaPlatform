        <Section>
          <SubTitle>Stat Card Grid</SubTitle>
          <div className="uikit-responsive-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 'var(--space-4)', maxWidth: 600 }}>
            {[
              { label: '总任务数', value: '2,847', trend: '+5.2%', up: true },
              { label: '成功率', value: '98.6%', trend: '+1.3%', up: true },
              { label: '平均延迟', value: '42ms', trend: '-8ms', up: false },
            ].map(c => (
              <Card key={c.label}>
                <div style={{ fontSize: 'var(--font-size-caption)', color: 'var(--muted-foreground)', marginBottom: 'var(--space-2)' }}>{c.label}</div>
                <div style={{ fontSize: 'var(--font-size-display)', fontWeight: 'var(--font-weight-display)', color: 'var(--fg)', marginBottom: 'var(--space-2)' }}>{c.value}</div>
                <div style={{ fontSize: 'var(--font-size-caption)', color: c.up ? 'var(--mp-green-600)' : 'var(--mp-blue-600)', fontWeight: 500 }}>{c.trend}</div>
              </Card>
            ))}
          </div>
        </Section>
      </div>
    );

    /* ──────────────────────────── Panel: Table ──────────────────────────── */

    const Badge = ({ variant, children }) => {
      const v = badgeVariants[variant] || badgeVariants.default;
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 'var(--mp-radius-full)', fontSize: 'var(--font-size-caption)', fontWeight: 500, background: v.bg, color: v.color, lineHeight: 1.5 }}>
          {children}
        </span>
      );
    };

    const TablePanel = () => (
      <div>
        <SectionTitle>Table</SectionTitle>
        <Section>
          <div className="uikit-table-wrap" style={{ border: '1px solid var(--border)', borderRadius: 'var(--mp-radius-lg)', overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 'var(--font-size-body)' }}>
              <thead>
                <tr style={{ background: 'var(--surface-dim)' }}>
                  {['编号', '名称', '类型', '状态', '负责人', '更新时间', '操作'].map(h => (
                    <th key={h} style={{ padding: 'var(--space-3) var(--space-4)', textAlign: 'left', fontSize: 'var(--font-size-caption)', fontWeight: 'var(--font-weight-eyebrow)', color: 'var(--muted-foreground)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--border)' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {tableData.map(row => (
                  <tr key={row.id} style={{ borderBottom: '1px solid var(--border)' }}>
                    <td style={{ padding: 'var(--space-3) var(--space-4)', color: 'var(--muted-foreground)', fontSize: 'var(--font-size-caption)' }}>{row.id}</td>
                    <td style={{ padding: 'var(--space-3) var(--space-4)', color: 'var(--fg)', fontWeight: 500 }}>{row.name}</td>
                    <td style={{ padding: 'var(--space-3) var(--space-4)', color: 'var(--muted-foreground)' }}>{row.type}</td>
                    <td style={{ padding: 'var(--space-3) var(--space-4)' }}><Badge variant={row.status}>{row.statusLabel}</Badge></td>
                    <td style={{ padding: 'var(--space-3) var(--space-4)', color: 'var(--fg)' }}>{row.owner}</td>
                    <td style={{ padding: 'var(--space-3) var(--space-4)', color: 'var(--muted-foreground)', fontSize: 'var(--font-size-caption)' }}><span className="uikit-nowrap">{row.updated}</span></td>
                    <td className="uikit-action-cell" style={{ padding: 'var(--space-3) var(--space-4)' }}>
                      <a className="uikit-action" href="javascript:void(0)" style={{ color: 'var(--link)', textDecoration: 'none', fontSize: 'var(--font-size-caption)', marginRight: 8 }}>编辑</a>
                      <a className="uikit-action" href="javascript:void(0)" style={{ color: 'var(--link)', textDecoration: 'none', fontSize: 'var(--font-size-caption)' }}>详情</a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Section>
      </div>
    );

    /* ──────────────────────────── Panel: Input ──────────────────────────── */

    const InputField = ({ label, placeholder, disabled, icon, focused, onFocus, onBlur, style }) => (
      <div style={{ ...style }}>
        {label && <label style={{ display: 'block', fontSize: 'var(--font-size-caption)', fontWeight: 500, color: 'var(--fg)', marginBottom: 'var(--space-2)' }}>{label}</label>}
        <div style={{ display: 'flex', alignItems: 'center', background: disabled ? 'var(--muted)' : 'var(--surface)', border: `1px solid ${focused ? 'var(--primary)' : 'var(--border)'}`, borderRadius: 'var(--mp-radius-md)', padding: '0 var(--space-3)', height: 'var(--size-input-height-md)' }}>
          {icon && <span style={{ marginRight: 'var(--space-2)', display: 'flex', alignItems: 'center', color: disabled ? 'var(--mp-slate-300)' : 'var(--muted-foreground)' }}>{icon}</span>}
          <input
            type="text"
            placeholder={placeholder}
            disabled={disabled}
            onFocus={onFocus}
            onBlur={onBlur}
            style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 'var(--font-size-body)', color: disabled ? 'var(--muted-foreground)' : 'var(--fg)', fontFamily: 'var(--font-body)', lineHeight: 1, cursor: disabled ? 'not-allowed' : 'text', '::placeholder': { color: 'var(--muted-foreground)' } }}
          />
        </div>
      </div>
    );

    const InputPanel = () => (
      <div>
        <SectionTitle>Input</SectionTitle>
        <Section>
          <SubTitle>标准输入框</SubTitle>
          <div style={{ maxWidth: 360 }}>
            <FocusableInput label="项目名称" placeholder="请输入项目名称" />
          </div>
        </Section>
        <Section>
          <SubTitle>搜索输入框</SubTitle>
          <div style={{ maxWidth: 360 }}>
            <FocusableInput
              label="搜索"
              placeholder="搜索应用、模型、数据..."
              icon={<svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>}
            />
          </div>
        </Section>
        <Section>
          <SubTitle>禁用态</SubTitle>
          <div style={{ maxWidth: 360 }}>
            <InputField label="禁用字段" placeholder="不可编辑" disabled />
          </div>
        </Section>
      </div>
    );

    const FocusableInput = (props) => {
      const [f, setF] = useState(false);
      return <InputField {...props} focused={f} onFocus={() => setF(true)} onBlur={() => setF(false)} />;
    };

    /* ──────────────────────────── Panel: Badge ──────────────────────────── */

    const BadgePanel = () => (
      <div>
        <SectionTitle>Badge</SectionTitle>
        <Section>
          <SubTitle>变体</SubTitle>
          <div style={{ display: 'flex', gap: 'var(--space-3)', flexWrap: 'wrap' }}>
            {Object.entries(badgeVariants).map(([k, v]) => (
              <Badge key={k} variant={k}>{v.label}</Badge>
            ))}
          </div>
        </Section>
        <Section>
          <SubTitle>使用场景</SubTitle>
          <div style={{ display: 'flex', gap: 'var(--space-3)', flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-3)', fontSize: 'var(--font-size-body)', color: 'var(--fg)' }}>
              部署状态：<Badge variant="success">已上线</Badge>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-3)', fontSize: 'var(--font-size-body)', color: 'var(--fg)' }}>
              审核状态：<Badge variant="warning">待审核</Badge>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-3)', fontSize: 'var(--font-size-body)', color: 'var(--fg)' }}>
              错误标记：<Badge variant="error">失败</Badge>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--space-3)', fontSize: 'var(--font-size-body)', color: 'var(--fg)' }}>
              版本标签：<Badge variant="primary">v2.0</Badge>
            </div>
          </div>
        </Section>
      </div>
    );

    /* ──────────────────────────── Panel: Sidebar ──────────────────────────── */

    const SidebarPanel = () => {
      const [active, setActive] = useState(0);
      return (
        <div>
          <SectionTitle>Sidebar</SectionTitle>
          <Section>
            <div style={{ display: 'flex', gap: 'var(--space-6)', alignItems: 'flex-start' }}>
              <div style={{ width: 220, background: 'var(--mp-sidebar-bg)', borderRadius: 'var(--mp-radius-lg)', padding: 'var(--space-4) 0', flexShrink: 0, overflow: 'hidden' }}>
                {sidebarMenus.map((item, i) => (
                  <div
                    key={item.label}
                    onClick={() => setActive(i)}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 'var(--space-3)',
                      padding: '8px var(--space-5)', cursor: 'pointer',
                      color: i === active ? 'var(--mp-sidebar-text-active)' : 'var(--mp-sidebar-text)',
                      background: i === active ? 'rgba(59,130,246,0.15)' : 'transparent',
                      fontWeight: i === active ? 500 : 400, fontSize: 'var(--font-size-body)',
                      borderLeft: i === active ? '3px solid #60a5fa' : '3px solid transparent',
                      transition: 'all 0.15s',
                    }}
                  >
                    <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"><path d={item.icon}/></svg>
                    <span className="uikit-truncate">{item.label}</span>
                  </div>
                ))}
                <div style={{ marginTop: 'var(--space-6)', padding: '0 var(--space-5)', borderTop: '1px solid var(--mp-slate-700)', paddingTop: 'var(--space-3)' }}>
                  <div style={{ fontSize: 'var(--font-size-caption)', color: 'var(--mp-slate-500)' }}>MetaPlatform v2.4.0</div>
                </div>
              </div>
              <div style={{ flex: 1, fontSize: 'var(--font-size-body)', color: 'var(--muted-foreground)' }}>
                <p style={{ marginTop: 0, marginBottom: 'var(--space-4)' }}>点击左侧菜单项查看交互效果。当前选中：</p>
                <div style={{ padding: 'var(--space-4)', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--mp-radius-lg)' }}>
                  <span style={{ fontSize: 'var(--font-size-caption)', color: 'var(--muted-foreground)' }}>Active Menu: </span>
                  <span style={{ color: 'var(--fg)', fontWeight: 500 }}>{sidebarMenus[active].label}</span>
                </div>
              </div>
            </div>
          </Section>
        </div>
      );
    };

    /* ──────────────────────────── App Shell ──────────────────────────── */

    const panels = {
      colors: ColorsPanel,
      typography: TypographyPanel,
      spacing: SpacingPanel,
      button: ButtonPanel,
      card: CardPanel,
      table: TablePanel,
      input: InputPanel,
      badge: BadgePanel,
      sidebar: SidebarPanel,
    };

    const App = () => {
      const [active, setActive] = useState('button');
      const ActivePanel = panels[active];

      return (
        <div className="uikit-shell" style={{ display: 'flex', height: '100vh', margin: 0, fontFamily: 'var(--font-family-base)', background: 'var(--surface-dim)' }}>
          {/* ── Left Nav ── */}
          <nav style={{ width: 200, flexShrink: 0, background: 'var(--surface)', borderRight: '1px solid var(--border)', height: '100vh', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
            <div style={{ padding: 'var(--space-5) var(--space-4)', borderBottom: '1px solid var(--border)' }}>
              <span style={{ fontSize: 'var(--font-size-h1)', fontWeight: 'var(--font-weight-h1)', color: 'var(--fg)' }}>MetaPlatform</span>
            </div>
            <div style={{ flex: 1, padding: 'var(--space-3) 0' }}>
              {navGroups.map(group => (
                <div key={group.label} style={{ marginBottom: 'var(--space-4)' }}>
                  <div style={{ padding: 'var(--space-2) var(--space-5)', fontSize: 'var(--font-size-eyebrow)', fontWeight: 'var(--font-weight-eyebrow)', color: 'var(--muted-foreground)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{group.label}</div>
                  {group.items.map(item => (
                    <div
                      key={item.key}
                      onClick={() => setActive(item.key)}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--surface-dim)'}
                      onMouseLeave={e => e.currentTarget.style.background = active === item.key ? 'var(--surface-dim)' : 'transparent'}
                      style={{
                        padding: '6px var(--space-5)', cursor: 'pointer', fontSize: 'var(--font-size-body)',
                        color: active === item.key ? 'var(--primary)' : 'var(--fg)',
                        fontWeight: active === item.key ? 'var(--font-weight-lead)' : 400,
                        background: active === item.key ? 'var(--surface-dim)' : 'transparent',
                        transition: 'background 0.12s, color 0.12s',
                      }}
                    >
                      {item.label}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </nav>

          {/* ── Right Content ── */}
          <main className="uikit-main" style={{ flex: 1, overflowY: 'auto', padding: 'var(--space-6)' }}>
            <ActivePanel />
          </main>
        </div>
      );
    };

    /* ──────────────────────────── Mount ──────────────────────────── */

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
