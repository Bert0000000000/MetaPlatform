    .preview-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);

    .section-label {

      margin-top: var(--spacing-2xl);

    }

    /* ---- Grid ---- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-lg);
      max-width: 840px;
    }

    /* ---- Card Base ---- */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: var(--spacing-lg);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    /* ---- Card Inner Layout ---- */
    .card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      width: 20px;
      height: 20px;
    }
    .card-info {
      flex: 1;
      min-width: 0;
    }
    .card-title {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      line-height: var(--line-height-tight);
    }
    .card-code {
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      margin-top: 2px;
    }
    .card-desc {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-normal);
      margin-bottom: var(--spacing-md);
    }
    .card-action {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-primary);
      background: var(--color-primary-light);
      border: 1px solid transparent;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .card-action:hover {
      background: var(--color-primary-muted);
    }
    .card-action svg {
      width: 14px;
      height: 14px;
    }

    /* ---- Interactive Card ---- */
    .card-interactive {
      cursor: pointer;
    }
    .card-interactive:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
    }

    /* ---- Status Card ---- */
    .card-status {
      border-left: 3px solid var(--color-primary);
    }
    .card-status-success {
      border-left-color: var(--state-success);
    }
    .card-status-warning {
      border-left-color: var(--state-warning);
    }
    .card-status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-sm);
    }
    .card-status-name {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }
    .card-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--spacing-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      border-radius: var(--radius-pill);
      background: var(--color-bg-tertiary);
      color: var(--color-text-secondary);
    }
    .card-status-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }
    .status-dot-green {
      background: var(--state-success);
      box-shadow: 0 0 0 2px var(--state-success-bg);
    }
    .status-dot-red {
      background: var(--state-error);
      box-shadow: 0 0 0 2px var(--state-error-bg);
    }
    .status-text {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }

    /* ---- Compact Card ---- */
    .card-compact {
      padding: var(--spacing-md);
    }
    .card-compact .card-header {
      margin-bottom: var(--spacing-sm);
    }
    .card-compact .card-desc {
      margin-bottom: var(--spacing-sm);
    }

    /* ---- Label below card ---- */
    .card-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      text-align: center;
      margin-top: var(--spacing-sm);
    }

    /* ---- Hover hint annotation ---- */
    .hover-hint {
      position: absolute;
      top: var(--spacing-sm);
      right: var(--spacing-sm);
      font-size: var(--font-size-xs);
      color: var(--color-primary);
      background: var(--color-primary-light);
      padding: 2px var(--spacing-sm);
      border-radius: var(--radius-sm);
      pointer-events: none;
    }
    .card-wrapper {
      position: relative;
    }

    /* ---- Icon tint colors ---- */
    .icon-tint-blue { background: var(--color-primary-light); color: var(--color-primary); }
    .icon-tint-green { background: var(--tint-database-bg); color: var(--tint-database); }
    .icon-tint-orange { background: var(--tint-csv-bg); color: var(--tint-csv); }

      padding: var(--spacing-xl);

      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-xl);
    }

    /* ---- DataTable ---- */
    .data-table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
    }

    .data-table thead th {
      background: #f8fafc;
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      font-size: 12px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
    }

    .data-table thead th:first-child {
      border-top-left-radius: 4px;
    }

    .data-table thead th:last-child {
      border-top-right-radius: 4px;
    }

    .data-table tbody td {
      padding: 6px 12px;
      border-bottom: 1px solid #f1f5f9;
      color: var(--color-text-primary);
      vertical-align: middle;
      font-size: 12px;
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .data-table tbody tr:hover {
      background: var(--color-surface-hover);
    }

    /* ---- Cell: Name ---- */
    .cell-name {
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
    }

    /* ---- Badge (neutral) ---- */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: var(--font-weight-medium);
      padding: 1px 8px;
      border-radius: var(--radius-full);
      white-space: nowrap;
      line-height: var(--line-height-normal);
    }

    .badge-neutral {
      background: #f8fafc;
      color: var(--color-text-secondary);
    }

    /* ---- Status Dot ---- */
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .status-dot--green {
      background: var(--state-success);
    }

    .status-dot--red {
      background: var(--state-error);
    }

    /* ---- Action Buttons ---- */
    .action-group {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 12px;
      font-weight: var(--font-weight-medium);
      padding: 2px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      border: none;
      line-height: var(--line-height-normal);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
    }

    .btn-outline:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-light);
    }

    .btn-danger-text {
      background: transparent;
      border: none;
      color: var(--state-error);
      padding: 2px 8px;
    }

    .btn-danger-text:hover {
      background: var(--state-error-bg);
    }

  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-secondary);
  margin: 0;
}

.mp-code {
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-primary);
  margin: 0;
}

/* ============================================================
 * Component Surface Classes
 * ============================================================ */

.mp-surface {
  background-color: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
}

.mp-surface-raised {
  background-color: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float);
}

    

  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    

    /* Reset & base */

    /* Page title */
    .preview-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-xl);
      letter-spacing: -0.01em;
    }

    /* Preview wrapper */
    .preview-wrapper {
      display: flex;
      height: 640px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    /* Sidebar — compact minimal */
    .sidebar {
      width: 220px;
      min-width: 220px;
      height: 100%;
      background: var(--color-sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--color-sidebar-border);
    }

    /* Brand area — compact */
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: var(--spacing-lg) var(--spacing-lg);
      border-bottom: 1px solid var(--color-sidebar-border);
    }
    .sidebar-brand-icon {
      width: 32px;
      height: 32px;
      background: var(--color-primary);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 15px;
      font-weight: var(--font-weight-semibold);
      flex-shrink: 0;
    }
    .sidebar-brand-label {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Navigation — compact minimal */
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-md) var(--spacing-md);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.15); border-radius: 3px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      color: var(--color-sidebar-text);
      font-size: 12px;
      font-weight: var(--font-weight-normal);
      line-height: 1.5;
      white-space: nowrap;
    }
    .nav-item:hover {
      background: rgba(148,163,184,0.06);
      color: var(--color-sidebar-text-hover);
    }
    .nav-item.active {
      background: var(--color-sidebar-active-bg);
      color: var(--color-sidebar-active-text);
      font-weight: var(--font-weight-medium);
    }
    .nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }
    .nav-item.active svg {
      opacity: 1;
    }
    .nav-item:hover svg {
      opacity: 0.9;
    }

    /* Divider */
    .nav-divider {
      height: 1px;
      background: var(--color-sidebar-border);
      margin: var(--spacing-md) 4px;
    }

    /* User area — compact */
    .sidebar-user {
      padding: var(--spacing-lg);
      border-top: 1px solid var(--color-sidebar-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-user-avatar {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      flex-shrink: 0;
    }
    .sidebar-user-info {
      flex: 1;
      min-width: 0;
    }
    .sidebar-user-name {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .sidebar-user-email {
      font-size: 10px;
      color: var(--color-sidebar-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    /* Main content placeholder */
    .main-content-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      font-size: var(--font-size-base);
    }

    <script>
(function() {
  'use strict';
  var h = React.createElement;
  var useState = React.useState;

  /* ── Icon helper (inline SVG) ─────────────────────────────── */
  function Icon(props) {
    return h('svg', {
      width: props.size || 14,
      height: props.size || 14,
      viewBox: '0 0 24 24',

  var icons = {

    users: function(s) { return h(Icon, {size:s}, h('path',{d:'M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2'}), h('circle',{cx:'9',cy:'7',r:'4'}), h('path',{d:'M22 21v-2a4 4 0 0 0-3-3.87'}), h('path',{d:'M16 3.13a4 4 0 0 1 0 7.75'})); },
    file: function(s) { return h(Icon, {size:s}, h('path',{d:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'}), h('polyline',{points:'14,2 14,8 20,8'})); },
    settings: function(s) { return h(Icon, {size:s}, h('circle',{cx:'12',cy:'12',r:'3'}), h('path',{d:'M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z'})); },

  /* ── Sidebar Component ────────────────────────────────────── */
  function Sidebar() {
    var navItems = [

        { label: '用户管理', icon: 'users' },
        { label: '文件管理', icon: 'file' },

        { label: '安全审计', icon: 'shield' },
        { label: '活动日志', icon: 'activity' },

    return h('nav', { className: 'showcase-sidebar' },
      h('div', { className: 'sidebar-logo' }, 'MetaPlatform'),

  /* ── App ──────────────────────────────────────────────────── */

  /* ── Mount ─────────────────────────────────────────────────── */
  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(h(App));
})();
