<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataTable 数据表格 — MetaPlatform Design System</title>
    <style id="theme-vars">
/* ============================================================
 * MetaPlatform Design System — Compact Edition
 * ============================================================ */

:root {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;

  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;

  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: rgba(59, 130, 246, 0.15);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);

  --color-text-primary: #0f172a;
  --color-text-secondary: #64748b;
  --color-text-inverse: #ffffff;

  --color-border: #e2e8f0;

  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;

  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 18px;
  --font-size-2xl: 22px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;

  --line-height-normal: 1.5;

  --spacing-xs: 2px;
  --spacing-sm: 4px;
  --spacing-md: 8px;
  --spacing-lg: 12px;
  --spacing-xl: 16px;
  --spacing-2xl: 24px;

  --radius-sm: 3px;
  --radius-md: 4px;
  --radius-lg: 6px;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.1);

  --sidebar-width: 220px;

  --color-action: var(--color-primary);
  --color-action-hover: var(--color-primary-hover);
  --color-action-light: var(--color-primary-light);
  --color-content: var(--color-text-primary);
  --color-content-secondary: var(--color-text-secondary);
  --color-field: var(--color-border);
  --color-field-focus: var(--color-primary);
  --color-feedback-success: var(--state-success);
  --color-feedback-warning: var(--state-warning);
  --color-feedback-error: var(--state-error);
  --radius-btn: var(--radius-md);
  --radius-card: var(--radius-lg);
  --radius-input: var(--radius-md);
  --radius-pill: var(--radius-full);
}

.dark {
  --color-bg: #0f172a;
  --color-bg-secondary: #1e293b;
  --color-surface: #1e293b;
  --color-surface-hover: #334155;
  --color-sidebar-bg: #020617;
  --color-sidebar-text: #64748b;
  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-inverse: #0f172a;
  --color-border: #334155;
  --color-primary-light: rgba(59, 130, 246, 0.1);
  --state-success-bg: rgba(34, 197, 94, 0.1);
  --state-warning-bg: rgba(245, 158, 11, 0.1);
  --state-error-bg: rgba(239, 68, 68, 0.1);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.15);
}
    </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="component-showcase">
      <h1 class="component-title">DataTable 数据表格</h1>
      <p class="component-subtitle">紧凑型数据表格，用于展示结构化列表数据</p>

      <div class="data-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>名称</th>
              <th>类型</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="cell-name">客户管理</td>
              <td><span class="badge badge-neutral">页面</span></td>
              <td><span class="status-dot status-dot--green"></span> 运行中</td>
              <td>
                <div class="action-group">
                  <button class="btn btn-outline">预览</button>
                  <button class="btn btn-danger-text">删除</button>
                </div>
              </td>
            </tr>
            <tr>
              <td class="cell-name">工单系统</td>
              <td><span class="badge badge-neutral">模块</span></td>
              <td><span class="status-dot status-dot--green"></span> 运行中</td>
              <td>
                <div class="action-group">
                  <button class="btn btn-outline">预览</button>
                  <button class="btn btn-danger-text">删除</button>
                </div>
              </td>
            </tr>
            <tr>
              <td class="cell-name">数据报表</td>
              <td><span class="badge badge-neutral">页面</span></td>
              <td><span class="status-dot status-dot--red"></span> 已停用</td>
              <td>
                <div class="action-group">
                  <button class="btn btn-outline">预览</button>
                  <button class="btn btn-danger-text">删除</button>
                </div>
              </td>
            </tr>
            <tr>
              <td class="cell-name">权限配置</td>
              <td><span class="badge badge-neutral">模块</span></td>
              <td><span class="status-dot status-dot--green"></span> 运行中</td>
              <td>
                <div class="action-group">
                  <button class="btn btn-outline">预览</button>
                  <button class="btn btn-danger-text">删除</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <style>
    /* ---- Page Reset ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-bg-secondary);
      line-height: var(--line-height-normal);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Layout ---- */
    .page-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--spacing-2xl) var(--spacing-xl);
    }

    /* ---- Component Showcase ---- */
    .component-showcase {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-xl);
    }

    .component-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-xs);
      letter-spacing: -0.01em;
    }

    .component-subtitle {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-xl);
    }

    /* ---- DataTable ---- */
    .data-table-wrapper {
      width: 100%;
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
    }

    .data-table thead th {
      background: #f8fafc;
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      font-size: 12px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
    }

    .data-table thead th:first-child {
      border-top-left-radius: 4px;
    }

    .data-table thead th:last-child {
      border-top-right-radius: 4px;
    }

    .data-table tbody td {
      padding: 6px 12px;
      border-bottom: 1px solid #f1f5f9;
      color: var(--color-text-primary);
      vertical-align: middle;
      font-size: 12px;
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .data-table tbody tr:hover {
      background: var(--color-surface-hover);
    }

    /* ---- Cell: Name ---- */
    .cell-name {
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
    }

    /* ---- Badge (neutral) ---- */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: var(--font-weight-medium);
      padding: 1px 8px;
      border-radius: var(--radius-full);
      white-space: nowrap;
      line-height: var(--line-height-normal);
    }

    .badge-neutral {
      background: #f8fafc;
      color: var(--color-text-secondary);
    }

    /* ---- Status Dot ---- */
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .status-dot--green {
      background: var(--state-success);
    }

    .status-dot--red {
      background: var(--state-error);
    }

    /* ---- Action Buttons ---- */
    .action-group {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 12px;
      font-weight: var(--font-weight-medium);
      padding: 2px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      border: none;
      line-height: var(--line-height-normal);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
    }

    .btn-outline:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-light);
    }

    .btn-danger-text {
      background: transparent;
      border: none;
      color: var(--state-error);
      padding: 2px 8px;
    }

    .btn-danger-text:hover {
      background: var(--state-error-bg);
    }
  </style>
</body>
</html>
