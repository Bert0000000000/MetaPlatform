<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataTable 数据表格</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; background: #ffffff; color: #0f172a; padding: 40px; }
    .preview { max-width: 800px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #f8fafc; font-weight: 500; text-align: left; padding: 6px 12px; border-bottom: 1px solid #e2e8f0; color: #0f172a; font-size: 11px; }
    tbody td { padding: 6px 12px; border-bottom: 1px solid #f1f5f9; color: #64748b; }
    tbody tr:hover { background: #f8fafc; }
    .badge { display: inline-flex; align-items: center; border-radius: 9999px; font-size: 11px; padding: 1px 8px; background: #f8fafc; color: #64748b; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
    .dot-green { background: #22c55e; }
    .dot-amber { background: #f59e0b; }
    .btn-outline { display: inline-flex; align-items: center; padding: 2px 8px; font-size: 11px; border: 1px solid #e2e8f0; border-radius: 4px; background: transparent; color: #64748b; cursor: pointer; }
    .btn-danger { display: inline-flex; align-items: center; padding: 2px 8px; font-size: 11px; border: none; border-radius: 4px; background: transparent; color: #ef4444; cursor: pointer; }
    .actions { display: flex; gap: 6px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="preview">
    <h1>DataTable 数据表格</h1>
    <table>
      <thead>
        <tr><th>名称</th><th>类型</th><th>状态</th><th>操作</th></tr>
      </thead>
      <tbody>
        <tr>
          <td style="color:#0f172a;font-weight:500">客户管理页面</td>
          <td><span class="badge">表格页面</span></td>
          <td><span class="status-dot dot-green"></span>已发布</td>
          <td><div class="actions"><button class="btn-outline">预览</button><button class="btn-danger">删除</button></div></td>
        </tr>
        <tr>
          <td style="color:#0f172a;font-weight:500">工单管理</td>
          <td><span class="badge">表单页面</span></td>
          <td><span class="status-dot dot-amber"></span>草稿</td>
          <td><div class="actions"><button class="btn-outline">预览</button><button class="btn-danger">删除</button></div></td>
        </tr>
        <tr>
          <td style="color:#0f172a;font-weight:500">产品目录</td>
          <td><span class="badge">表格页面</span></td>
          <td><span class="status-dot dot-green"></span>已发布</td>
          <td><div class="actions"><button class="btn-outline">预览</button><button class="btn-danger">删除</button></div></td>
        </tr>
        <tr>
          <td style="color:#0f172a;font-weight:500">销售看板</td>
          <td><span class="badge">看板页面</span></td>
          <td><span class="status-dot dot-green"></span>已发布</td>
          <td><div class="actions"><button class="btn-outline">预览</button><button class="btn-danger">删除</button></div></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
