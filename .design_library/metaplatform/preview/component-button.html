<html lang="zh-CN">
<head>

    <title>Button 按钮 - MetaPlatform Design System</title>
    <style id="theme-vars">
/* ============================================================
 * MetaPlatform Design System
 * Enterprise low-code platform design tokens
 * Source: structured-spec (.design project extraction)
 * Brand Prefix: mp
 * ============================================================ */

/* ---- Color System ---- */
/* Source: structured-spec */
:root {
  /* Primary: Indigo Blue — enterprise trust */
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;
  --color-primary-muted: #bfdbfe;

  /* Neutral Scale */
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-bg-tertiary: #f1f5f9;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;

  /* Sidebar — dark navy */
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: rgba(59, 130, 246, 0.15);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);

  /* Text */
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #ffffff;

  /* Borders */
  --color-border: #e2e8f0;
  --color-border-light: #f1f5f9;

  /* State Colors */
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;
  --state-info: #3b82f6;
  --state-info-bg: #eff6ff;

  /* Accent tints for categories */
  --tint-ai: #8b5cf6;
  --tint-ai-bg: #f5f3ff;
  --tint-data: #06b6d4;
  --tint-data-bg: #ecfeff;
  --tint-tool: #f59e0b;
  --tint-tool-bg: #fffbeb;
  --tint-rest: #3b82f6;
  --tint-rest-bg: #eff6ff;
  --tint-database: #22c55e;
  --tint-database-bg: #f0fdf4;
  --tint-csv: #f59e0b;
  --tint-csv-bg: #fffbeb;

  /* ---- Typography ---- */
  /* Source: structured-spec */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.625;

  /* ---- Spacing ---- */
  /* Source: structured-spec */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ---- Radius ---- */
  /* Source: structured-spec */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Shadows (border-first, low alpha) ---- */
  /* Source: structured-spec */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.12);

  /* ---- Layout ---- */
  /* Source: structured-spec */
  --sidebar-width: 240px;
  --content-max-width: 1200px;
  --header-height: 56px;

  /* ---- Portable Aliases (for component consumption) ---- */
  /* Color aliases */
  --color-action: var(--color-primary);
  --color-action-hover: var(--color-primary-hover);
  --color-action-light: var(--color-primary-light);
  --color-content: var(--color-text-primary);
  --color-content-secondary: var(--color-text-secondary);
  --color-content-tertiary: var(--color-text-tertiary);
  --color-field: var(--color-border);
  --color-field-focus: var(--color-primary);
  --color-feedback-success: var(--state-success);
  --color-feedback-warning: var(--state-warning);
  --color-feedback-error: var(--state-error);
  --color-feedback-info: var(--state-info);

  /* Typography aliases */
  --type-heading: var(--font-weight-bold);
  --type-subheading: var(--font-weight-semibold);
  --type-body: var(--font-weight-normal);
  --type-caption: var(--font-weight-normal);

  /* Radius aliases */
  --radius-btn: var(--radius-md);
  --radius-card: var(--radius-lg);
  --radius-input: var(--radius-md);
  --radius-pill: var(--radius-full);
}

/* ---- Dark Mode ---- */
/* Source: structured-spec */
.dark {
  --color-bg: #0f172a;
  --color-bg-secondary: #1e293b;
  --color-bg-tertiary: #334155;
  --color-surface: #1e293b;
  --color-surface-hover: #334155;

  --color-sidebar-bg: #020617;
  --color-sidebar-text: #64748b;
  --color-sidebar-border: rgba(148, 163, 184, 0.15);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0f172a;

  --color-border: #334155;
  --color-border-light: #1e293b;

  --color-primary-light: rgba(59, 130, 246, 0.1);
  --color-primary-muted: rgba(59, 130, 246, 0.3);

  --state-success-bg: rgba(34, 197, 94, 0.1);
  --state-warning-bg: rgba(245, 158, 11, 0.1);
  --state-error-bg: rgba(239, 68, 68, 0.1);
  --state-info-bg: rgba(59, 130, 246, 0.1);

  --tint-ai-bg: rgba(139, 92, 246, 0.1);
  --tint-data-bg: rgba(6, 182, 212, 0.1);
  --tint-tool-bg: rgba(245, 158, 11, 0.1);
  --tint-rest-bg: rgba(59, 130, 246, 0.1);
  --tint-database-bg: rgba(34, 197, 94, 0.1);
  --tint-csv-bg: rgba(245, 158, 11, 0.1);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.07);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.14);
}

/* ---- Typography Scale Classes ---- */
.mp-h1 { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); color: var(--color-text-primary); letter-spacing: -0.02em; }
.mp-h2 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); color: var(--color-text-primary); letter-spacing: -0.01em; }
.mp-h3 { font-size: var(--font-size-xl); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); color: var(--color-text-primary); }
.mp-h4 { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); color: var(--color-text-primary); }
.mp-body { font-size: var(--font-size-base); font-weight: var(--font-weight-normal); line-height: var(--line-height-normal); color: var(--color-text-secondary); }
.mp-caption { font-size: var(--font-size-sm); font-weight: var(--font-weight-normal); line-height: var(--line-height-normal); color: var(--color-text-tertiary); }
.mp-code { font-family: var(--font-mono); font-size: var(--font-size-sm); }

/* ---- Component Surfaces ---- */
.mp-surface { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
.mp-surface-raised { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--mp-background); color: var(--mp-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
  <div class="container">

    <h1 class="page-title">Button 按钮</h1>
    <p class="page-desc">用于触发页面操作、执行流程或引导用户行为的交互元素。</p>

    <!-- Primary 主要按钮 -->
    <div class="section">
      <div class="section-label">VARIANT</div>
      <div class="section-title">Primary 主要按钮</div>

      <div class="btn-row">
        <span class="size-label">SM</span>
        <button class="btn btn-primary btn-sm">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v10M3 8l5 5 5-5"/></svg>

        </button>
        <button class="btn btn-primary btn-sm">

          执行
        </button>
        <button class="btn btn-primary btn-sm">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
          新建连接器
        </button>
      </div>

      <div class="btn-row">
        <span class="size-label">MD</span>
        <button class="btn btn-primary btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v10M3 8l5 5 5-5"/></svg>
          生成页面
        </button>
        <button class="btn btn-primary btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 13,8 5,13"/></svg>
          执行
        </button>
        <button class="btn btn-primary btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
          新建连接器
        </button>
      </div>
    </div>

    <!-- Outline 轮廓按钮 -->
    <div class="section">
      <div class="section-label">VARIANT</div>
      <div class="section-title">Outline 轮廓按钮</div>

      <div class="btn-row">
        <span class="size-label">SM</span>
        <button class="btn btn-outline btn-sm">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h12v10H2z"/><path d="M5 7h6"/></svg>
          预览
        </button>
        <button class="btn btn-outline btn-sm">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1 1 3 5.2M2 8l3-3M2 8l3 3"/></svg>
          测试连接
        </button>
        <button class="btn btn-outline btn-sm">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 0 1 12 0"/><path d="M8 2v4"/><path d="M8 10v4"/></svg>
          同步
        </button>
      </div>

      <div class="btn-row">
        <span class="size-label">MD</span>
        <button class="btn btn-outline btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h12v10H2z"/><path d="M5 7h6"/></svg>
          预览
        </button>
        <button class="btn btn-outline btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 1 1 3 5.2M2 8l3-3M2 8l3 3"/></svg>
          测试连接
        </button>
        <button class="btn btn-outline btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8a6 6 0 0 1 12 0"/><path d="M8 2v4"/><path d="M8 10v4"/></svg>

    <!-- Danger 危险按钮 -->
    <div class="section">
      <div class="section-label">VARIANT</div>
      <div class="section-title">Danger 危险按钮</div>

      <div class="btn-row">
        <span class="size-label">SM</span>
        <button class="btn btn-danger btn-sm">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10"/><path d="M6 4V3h4v1"/><path d="M4 4l1 9h6l1-9"/><path d="M6 7v4M10 7v4"/></svg>

        <span class="size-label">MD</span>
        <button class="btn btn-danger btn-md">
          <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10"/><path d="M6 4V3h4v1"/><path d="M4 4l1 9h6l1-9"/><path d="M6 7v4M10 7v4"/></svg>
          删除
        </button>
      </div>
    </div>

  </div>

    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans, "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif);
      background: #ffffff;
      color: var(--color-text-primary);
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .page-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .page-desc {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      margin-bottom: 40px;
    }
    .section {
      margin-bottom: 40px;
    }
    .section-label {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-tertiary);
      margin-bottom: 4px;
    }
    .section-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      margin-bottom: 16px;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .size-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      width: 32px;
      flex-shrink: 0;
      font-weight: var(--font-weight-medium);
    }

    /* ---- Base Button ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: var(--font-weight-medium);
      border: none;
      transition: opacity 0.15s ease;
      line-height: 1;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    /* ---- Primary ---- */
    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      border-radius: var(--radius-btn);
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
    }

    /* ---- Outline ---- */
    .btn-outline {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      border-radius: var(--radius-btn);
    }
    .btn-outline:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-light);
    }

    /* ---- Danger ---- */
    .btn-danger {
      background: transparent;
      border: none;
      color: var(--state-error);
      border-radius: var(--radius-btn);
    }
    .btn-danger:hover {
      background: var(--state-error-bg);
    }

    /* ---- Size SM ---- */
    .btn-sm {
      padding: 6px 12px;
      font-size: var(--font-size-xs);
    }

    /* ---- Size MD ---- */
    .btn-md {
      padding: 8px 16px;
      font-size: var(--font-size-sm);
    }

    /* SVG icon placeholder */
    .icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .btn-sm .icon {
      width: 12px;
      height: 12px;
    }
  </style>
</body>
