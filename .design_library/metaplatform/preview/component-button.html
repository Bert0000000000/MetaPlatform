<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button - MetaPlatform</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body {
      padding: var(--space-6);
      font-family: var(--font-body);
      color: var(--fg);
      background: var(--bg);
      margin: 0;
    }
    .page-title {
      font-family: var(--font-heading);
      font-size: var(--font-size-h1);
      font-weight: var(--font-weight-h1);
      line-height: var(--line-height-h1);
      margin: 0 0 var(--space-7) 0;
      color: var(--fg);
    }
    .section {
      margin-bottom: var(--space-7);
    }
    .section-label {
      font-family: var(--font-body);
      font-size: var(--font-size-eyebrow);
      font-weight: var(--font-weight-eyebrow);
      line-height: var(--line-height-eyebrow);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin: 0 0 var(--space-4) 0;
    }
    .row {
      display: flex;
      align-items: center;
      gap: var(--space-6);
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-2);
    }
    .variant-label {
      font-family: var(--font-body);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-caption);
      line-height: var(--line-height-caption);
      color: var(--muted-foreground);
    }
    /* Base button reset */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-lead);
      line-height: 1;
      height: var(--size-button-height-md);
      padding: 0 var(--space-5);
      border: none;
      border-radius: var(--radius-md);
      cursor: default;
      white-space: nowrap;
      user-select: none;
      outline: none;
      box-sizing: border-box;
    }
    /* Primary */
    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }
    .btn-primary-hover {
      background: var(--primary-hover);
      color: #ffffff;
      opacity: 1;
    }
    /* Ghost */
    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }
    .btn-ghost-hover {
      background: var(--muted);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    /* Small */
    .btn-sm {
      height: var(--size-button-height);
      padding: 0 var(--space-4);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-lead);
    }
  </style>
</head>
<body>
  <h1 class="page-title">Button</h1>

  <!-- Primary Button -->
  <div class="section">
    <div class="section-label">Primary Button</div>
    <div class="row">
      <div class="item">
        <button class="btn btn-primary">Default</button>
        <span class="variant-label">Default</span>
      </div>
      <div class="item">
        <button class="btn btn-primary-hover">Default</button>
        <span class="variant-label">Hover</span>
      </div>
    </div>
  </div>

  <!-- Ghost Button -->
  <div class="section">
    <div class="section-label">Ghost Button</div>
    <div class="row">
      <div class="item">
        <button class="btn btn-ghost">Default</button>
        <span class="variant-label">Default</span>
      </div>
      <div class="item">
        <button class="btn btn-ghost-hover">Default</button>
        <span class="variant-label">Hover</span>
      </div>
    </div>
  </div>

  <!-- Small Size -->
  <div class="section">
    <div class="section-label">Small Size</div>
    <div class="row">
      <div class="item">
        <button class="btn btn-primary btn-sm">Small</button>
        <span class="variant-label">Small Primary</span>
      </div>
    </div>
  </div>

  <script>/* no interaction needed */</script>
</body>
</html>
