<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button 按钮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; background: #ffffff; color: #0f172a; padding: 40px; }
    .preview { max-width: 500px; margin: 0 auto; }
    .section { margin-bottom: 24px; }
    .section-label { font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; padding: 4px 12px; font-size: 11px; font-weight: 500; border-radius: 4px; cursor: pointer; line-height: 1.5; border: none; }
    .btn-primary { background: #3b82f6; color: #ffffff; }
    .btn-outline { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
    .btn-danger { background: transparent; color: #ef4444; border: none; padding: 4px 8px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="preview">
    <h1>Button 按钮</h1>
    <div class="section">
      <div class="section-label">Primary 主要按钮</div>
      <div class="row">
        <button class="btn btn-primary">生成页面</button>
        <button class="btn btn-primary">执行</button>
        <button class="btn btn-primary">新建连接器</button>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Outline 轮廓按钮</div>
      <div class="row">
        <button class="btn btn-outline">预览</button>
        <button class="btn btn-outline">测试连接</button>
        <button class="btn btn-outline">同步</button>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Danger 危险按钮</div>
      <div class="row">
        <button class="btn btn-danger">删除</button>
        <button class="btn btn-danger">移除</button>
        <button class="btn btn-danger">清除</button>
      </div>
    </div>
  </div>
</body>
</html>
