<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card 卡片</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; background: #ffffff; color: #0f172a; padding: 40px; }
    .preview { max-width: 700px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; }
    .card-interactive { cursor: pointer; transition: border-color 0.15s; }
    .card-interactive:hover { border-color: #3b82f6; }
    .card-icon { width: 28px; height: 28px; border-radius: 4px; background: #f8fafc; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 13px; }
    .card-title { font-size: 13px; font-weight: 500; color: #0f172a; margin-bottom: 2px; }
    .card-code { font-size: 11px; font-family: 'SFMono-Regular', Consolas, monospace; color: #94a3b8; margin-bottom: 4px; }
    .card-desc { font-size: 11px; color: #64748b; line-height: 1.5; }
    .card-status { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .card-status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .card-status-text { font-size: 11px; }
    .text-green { color: #22c55e; }
    .text-red { color: #ef4444; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="preview">
    <h1>Card 卡片</h1>
    <div class="grid">
      <div class="card">
        <div class="card-icon">C</div>
        <div class="card-title">客户管理</div>
        <div class="card-code">customer</div>
        <div class="card-desc">核心业务对象，包含客户基本信息</div>
      </div>
      <div class="card card-interactive">
        <div class="card-icon">T</div>
        <div class="card-title">工单系统</div>
        <div class="card-code">ticket</div>
        <div class="card-desc">技术支持工单生命周期管理</div>
      </div>
      <div class="card">
        <div class="card-status">
          <span class="card-status-dot dot-green"></span>
          <span class="card-status-text text-green">已连接</span>
        </div>
        <div class="card-title">CRM API</div>
        <div class="card-code">conn_crm_001</div>
        <div class="card-desc">REST API 连接器</div>
      </div>
      <div class="card">
        <div class="card-status">
          <span class="card-status-dot dot-red"></span>
          <span class="card-status-text text-red">异常</span>
        </div>
        <div class="card-title">产品CSV导入</div>
        <div class="card-code">conn_csv_003</div>
        <div class="card-desc">CSV 文件数据导入</div>
      </div>
    </div>
  </div>
</body>
</html>
