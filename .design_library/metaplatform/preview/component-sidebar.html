    <style id="theme-vars">
/* ============================================================
 * MetaPlatform Design System
 * Enterprise low-code platform design tokens
 * Source: structured-spec (.design project extraction)
 * Brand Prefix: mp
 * ============================================================ */

/* ---- Color System ---- */
/* Source: structured-spec */
:root {
  /* Primary: Indigo Blue — enterprise trust */
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;
  --color-primary-muted: #bfdbfe;

  /* Neutral Scale */
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-bg-tertiary: #f1f5f9;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;

  /* Sidebar — dark navy */
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: rgba(59, 130, 246, 0.15);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);

  /* Text */
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #ffffff;

  /* Borders */
  --color-border: #e2e8f0;
  --color-border-light: #f1f5f9;

  /* State Colors */
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;
  --state-info: #3b82f6;
  --state-info-bg: #eff6ff;

  /* Accent tints for categories */
  --tint-ai: #8b5cf6;
  --tint-ai-bg: #f5f3ff;
  --tint-data: #06b6d4;
  --tint-data-bg: #ecfeff;
  --tint-tool: #f59e0b;
  --tint-tool-bg: #fffbeb;
  --tint-rest: #3b82f6;
  --tint-rest-bg: #eff6ff;
  --tint-database: #22c55e;
  --tint-database-bg: #f0fdf4;
  --tint-csv: #f59e0b;
  --tint-csv-bg: #fffbeb;

  /* ---- Typography ---- */
  /* Source: structured-spec */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.625;

  /* ---- Spacing ---- */
  /* Source: structured-spec */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ---- Radius ---- */
  /* Source: structured-spec */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Shadows (border-first, low alpha) ---- */
  /* Source: structured-spec */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.05);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.12);

  /* ---- Layout ---- */
  /* Source: structured-spec */
  --sidebar-width: 240px;
  --content-max-width: 1200px;
  --header-height: 56px;

  /* ---- Portable Aliases (for component consumption) ---- */
  /* Color aliases */
  --color-action: var(--color-primary);
  --color-action-hover: var(--color-primary-hover);
  --color-action-light: var(--color-primary-light);
  --color-content: var(--color-text-primary);
  --color-content-secondary: var(--color-text-secondary);
  --color-content-tertiary: var(--color-text-tertiary);
  --color-field: var(--color-border);
  --color-field-focus: var(--color-primary);
  --color-feedback-success: var(--state-success);
  --color-feedback-warning: var(--state-warning);
  --color-feedback-error: var(--state-error);
  --color-feedback-info: var(--state-info);

  /* Typography aliases */
  --type-heading: var(--font-weight-bold);
  --type-subheading: var(--font-weight-semibold);
  --type-body: var(--font-weight-normal);
  --type-caption: var(--font-weight-normal);

  /* Radius aliases */
  --radius-btn: var(--radius-md);
  --radius-card: var(--radius-lg);
  --radius-input: var(--radius-md);
  --radius-pill: var(--radius-full);
}

/* ---- Dark Mode ---- */
/* Source: structured-spec */
.dark {
  --color-bg: #0f172a;
  --color-bg-secondary: #1e293b;
  --color-bg-tertiary: #334155;
  --color-surface: #1e293b;
  --color-surface-hover: #334155;

  --color-sidebar-bg: #020617;
  --color-sidebar-text: #64748b;
  --color-sidebar-border: rgba(148, 163, 184, 0.15);

  --color-text-primary: #f1f5f9;
  --color-text-secondary: #94a3b8;
  --color-text-tertiary: #64748b;
  --color-text-inverse: #0f172a;

  --color-border: #334155;
  --color-border-light: #1e293b;

  --color-primary-light: rgba(59, 130, 246, 0.1);
  --color-primary-muted: rgba(59, 130, 246, 0.3);

  --state-success-bg: rgba(34, 197, 94, 0.1);
  --state-warning-bg: rgba(245, 158, 11, 0.1);
  --state-error-bg: rgba(239, 68, 68, 0.1);
  --state-info-bg: rgba(59, 130, 246, 0.1);

  --tint-ai-bg: rgba(139, 92, 246, 0.1);
  --tint-data-bg: rgba(6, 182, 212, 0.1);
  --tint-tool-bg: rgba(245, 158, 11, 0.1);
  --tint-rest-bg: rgba(59, 130, 246, 0.1);
  --tint-database-bg: rgba(34, 197, 94, 0.1);
  --tint-csv-bg: rgba(245, 158, 11, 0.1);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.07);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.14);
}

/* ---- Typography Scale Classes ---- */
.mp-h1 { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); color: var(--color-text-primary); letter-spacing: -0.02em; }
.mp-h2 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); color: var(--color-text-primary); letter-spacing: -0.01em; }
.mp-h3 { font-size: var(--font-size-xl); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); color: var(--color-text-primary); }
.mp-h4 { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); color: var(--color-text-primary); }
.mp-body { font-size: var(--font-size-base); font-weight: var(--font-weight-normal); line-height: var(--line-height-normal); color: var(--color-text-secondary); }
.mp-caption { font-size: var(--font-size-sm); font-weight: var(--font-weight-normal); line-height: var(--line-height-normal); color: var(--color-text-tertiary); }
.mp-code { font-family: var(--font-mono); font-size: var(--font-size-sm); }

/* ---- Component Surfaces ---- */
.mp-surface { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
.mp-surface-raised { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }

    </style>

    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);

  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>

        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>

    <style>
    /* Reset & base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      padding: 32px;
      min-height: 100vh;
    }

    /* Page title */
    .preview-title {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: 24px;
      letter-spacing: -0.01em;
    }

    /* Preview wrapper */
    .preview-wrapper {
      display: flex;
      height: 100%;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      height: 640px;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--color-sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--color-sidebar-border);
    }

    /* Brand area */
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px;
      border-bottom: 1px solid var(--color-sidebar-border);
    }
    .sidebar-brand-icon {
      width: 36px;
      height: 36px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 18px;
      font-weight: var(--font-weight-bold);
      flex-shrink: 0;
    }
    .sidebar-brand-label {
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Navigation */
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      color: var(--color-sidebar-text);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-normal);
      white-space: nowrap;
    }
    .nav-item:hover {
      background: rgba(148,163,184,0.08);
      color: var(--color-sidebar-text-hover);
    }
    .nav-item.active {
      background: var(--color-sidebar-active-bg);
      color: var(--color-sidebar-active-text);
      font-weight: var(--font-weight-medium);
    }
    .nav-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .nav-item.active svg {
      opacity: 1;
    }
    .nav-item:hover svg {
      opacity: 1;
    }

    /* Divider */
    .nav-divider {
      height: 1px;
      background: var(--color-sidebar-border);
      margin: 8px 12px;
    }

    /* User area */
    .sidebar-user {
      padding: 16px;
      border-top: 1px solid var(--color-sidebar-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-user-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      flex-shrink: 0;
    }
    .sidebar-user-info {
      flex: 1;
      min-width: 0;
    }
    .sidebar-user-name {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-user-email {
      font-size: var(--font-size-xs);
      color: var(--color-sidebar-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main content placeholder */
    .main-content-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-tertiary);
      font-size: var(--font-size-base);
    }
  </style>
</body>
