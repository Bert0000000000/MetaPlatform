<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar 侧边栏导航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; background: #f1f5f9; color: #0f172a; padding: 40px; }
    .preview { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
    .sidebar { width: 220px; background: #0f172a; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; min-height: 480px; }
    .brand { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid rgba(148,163,184,0.1); }
    .brand-icon { width: 32px; height: 32px; border-radius: 4px; background: #3b82f6; color: #ffffff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .brand-text { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 4px; font-size: 12px; color: #94a3b8; cursor: pointer; transition: background 0.15s, color 0.15s; text-decoration: none; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #cbd5e1; }
    .nav-item.active { background: rgba(59,130,246,0.15); color: #60a5fa; font-weight: 500; }
    .nav-item svg { width: 16px; height: 16px; opacity: 0.6; }
    .nav-item.active svg { opacity: 1; }
    .user-area { padding: 12px 16px; border-top: 1px solid rgba(148,163,184,0.1); display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #cbd5e1; font-weight: 500; }
    .user-name { font-size: 12px; color: #f1f5f9; }
    .user-email { font-size: 10px; color: #64748b; }
  </style>
</head>
<body>
  <div class="preview">
    <h1>Sidebar 侧边栏导航</h1>
    <div class="sidebar">
      <div class="brand">
        <div class="brand-icon">M</div>
        <div class="brand-text">MetaPlatform</div>
      </div>
      <div class="nav">
        <a class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>页面配置</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <span>ObjectType</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          <span>建模工场</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          <span>设计器</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
          <span>流程设计器</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>AI 对话</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span>能力中心</span>
        </a>
        <a class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span>集成中心</span>
        </a>
      </div>
      <div class="user-area">
        <div class="user-avatar">A</div>
        <div>
          <div class="user-name">Admin</div>
          <div class="user-email">admin@metaplatform.io</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
