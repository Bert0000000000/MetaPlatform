<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input 输入框</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; background: #ffffff; color: #0f172a; padding: 40px; }
    .preview { max-width: 500px; margin: 0 auto; }
    .section { margin-bottom: 20px; }
    .section-label { font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .field { margin-bottom: 12px; }
    .field-label { display: block; font-size: 12px; font-weight: 500; color: #0f172a; margin-bottom: 4px; }
    .field-input { width: 100%; padding: 6px 10px; font-size: 12px; border: 1px solid #e2e8f0; border-radius: 4px; background: #f8fafc; color: #0f172a; outline: none; font-family: inherit; }
    .field-input:focus { border-color: #3b82f6; }
    .field-input::placeholder { color: #94a3b8; }
    .field-textarea { min-height: 60px; resize: vertical; }
    .mono { font-family: 'SFMono-Regular', Consolas, monospace; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="preview">
    <h1>Input 输入框</h1>
    <div class="section">
      <div class="section-label">文本输入 Text</div>
      <div class="field">
        <label class="field-label">显示名称</label>
        <input class="field-input" type="text" placeholder="请输入显示名称">
      </div>
      <div class="field">
        <label class="field-label">API 地址</label>
        <input class="field-input mono" type="text" placeholder="https://api.example.com">
      </div>
    </div>
    <div class="section">
      <div class="section-label">文本域 Textarea</div>
      <div class="field">
        <label class="field-label">描述</label>
        <textarea class="field-input field-textarea" placeholder="请输入描述信息..."></textarea>
      </div>
    </div>
  </div>
</body>
</html>
