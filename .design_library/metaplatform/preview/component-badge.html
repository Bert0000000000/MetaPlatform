<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge 徽章标签</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; background: #ffffff; color: #0f172a; padding: 40px; }
    .preview { max-width: 500px; margin: 0 auto; }
    .section { margin-bottom: 24px; }
    .section-label { font-size: 11px; font-weight: 500; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .row { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; border-radius: 9999px; font-size: 11px; font-weight: 500; padding: 1px 8px; line-height: 1.5; }
    .badge-neutral { background: #f8fafc; color: #64748b; }
    .badge-success { background: #f0fdf4; color: #22c55e; }
    .badge-error { background: #fef2f2; color: #ef4444; }
    .badge-warning { background: #fffbeb; color: #f59e0b; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .dot-amber { background: #f59e0b; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="preview">
    <h1>Badge 徽章标签</h1>
    <div class="section">
      <div class="section-label">默认 Default</div>
      <div class="row">
        <span class="badge badge-neutral">表格页面</span>
        <span class="badge badge-neutral">表单页面</span>
        <span class="badge badge-neutral">看板页面</span>
      </div>
    </div>
    <div class="section">
      <div class="section-label">状态 Status</div>
      <div class="row">
        <span class="badge badge-success"><span class="status-dot dot-green"></span>已连接</span>
        <span class="badge badge-error"><span class="status-dot dot-red"></span>异常</span>
        <span class="badge badge-warning"><span class="status-dot dot-amber"></span>待审核</span>
      </div>
    </div>
  </div>
</body>
</html>
