spring:
  application:
    name: metaplatform-app-service
  main:
    web-application-type: servlet
    banner-mode: "off"
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/app_service}
    username: ${SPRING_DATASOURCE_USERNAME:meta}
    password: ${SPRING_DATASOURCE_PASSWORD:metaplatform}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC
    open-in-view: false

server:
  port: ${SERVER_PORT:8092}
  tomcat:
    jsp-servlet:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

metaplatform:
  default-tenant: ${METAPLATFORM_DEFAULT_TENANT:default-tenant}
  auth:
    mode: ${METAPLATFORM_AUTH_MODE:dev}
    # dev 模式下未带 token 也能放行（标记 tenant=default-tenant, roles=[admin]）
    # production 模式强制 JWT
  ontology-engine:
    url: ${ONTOLOGY_ENGINE_URL:http://localhost:8080}
  page-generator:
    url: ${PAGE_GENERATOR_URL:http://localhost:8083}
  trace-id-header: X-Trace-Id

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}] [tenant=%X{tenant}]"
