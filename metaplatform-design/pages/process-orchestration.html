<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流程中心 - 服务编排 - MetaPlatform</title>
    <style id="theme-vars">
:root {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: rgba(59, 130, 246, 0.15);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);
  --color-text-primary: #0f172a;
  --color-text-secondary: #64748b;
  --color-text-inverse: #ffffff;
  --color-border: #e2e8f0;
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 18px;
  --font-size-2xl: 22px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --line-height-normal: 1.5;
  --spacing-xs: 2px;
  --spacing-sm: 4px;
  --spacing-md: 8px;
  --spacing-lg: 12px;
  --spacing-xl: 16px;
  --spacing-2xl: 24px;
  --radius-sm: 3px;
  --radius-md: 4px;
  --radius-lg: 6px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.1);
  --sidebar-width: 220px;
}
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
@theme inline { --color-primary: var(--color-primary); --color-border: var(--color-border); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font-sans); font-size: var(--font-size-base); color: var(--color-text-primary); background: var(--color-bg); line-height: var(--line-height-normal); -webkit-font-smoothing: antialiased; }
input, textarea, select, button { font-family: inherit; font-size: inherit; }
.nav-item { display: flex; align-items: center; gap: var(--spacing-lg); padding: var(--spacing-md) var(--spacing-xl); font-size: var(--font-size-sm); font-weight: var(--font-weight-normal); color: var(--color-sidebar-text); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; text-decoration: none; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--color-sidebar-active-bg); color: var(--color-sidebar-text-hover); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.tab-item { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm) var(--spacing-lg); font-size: var(--font-size-sm); font-weight: var(--font-weight-normal); color: var(--color-text-secondary); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; }
.tab-item:hover { color: var(--color-text-primary); }
.tab-item.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: var(--font-weight-medium); }
.btn { display: inline-flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-sm) var(--spacing-lg); font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; white-space: nowrap; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text-primary); }
.btn:hover { background: var(--color-surface-hover); }
.btn svg { width: 14px; height: 14px; }
.btn-primary { border-color: var(--color-primary); background: var(--color-primary); color: var(--color-text-inverse); }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost { border-color: transparent; color: var(--color-text-secondary); }
.btn-ghost:hover { background: var(--color-bg-secondary); }
.inp { width: 100%; padding: 6px 10px; font-size: var(--font-size-sm); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-bg); color: var(--color-text-primary); outline: none; transition: border-color 0.15s; }
.inp:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12); }
.inp::placeholder { color: var(--color-text-secondary); }
.badge { display: inline-flex; align-items: center; padding: 1px 6px; font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); border-radius: var(--radius-full); }
.badge-default { background: var(--color-bg-secondary); color: var(--color-text-secondary); }
.badge-primary { background: var(--color-primary-light); color: var(--color-primary); }
.badge-success { background: var(--state-success-bg); color: var(--state-success); }
.badge-warning { background: var(--state-warning-bg); color: var(--state-warning); }
.badge-error { background: var(--state-error-bg); color: var(--state-error); }
.card { border: 1px solid var(--color-border); border-radius: var(--radius-lg); background: var(--color-surface); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: var(--spacing-md) var(--spacing-lg); font-size: var(--font-size-sm); white-space: nowrap; }
th { color: var(--color-text-secondary); font-weight: var(--font-weight-medium); background: var(--color-bg-secondary); border-bottom: 1px solid var(--color-border); }
td { color: var(--color-text-primary); border-bottom: 1px solid var(--color-border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-surface-hover); }
.pagination { display: flex; align-items: center; gap: var(--spacing-sm); }
.page-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); color: var(--color-text-primary); font-size: var(--font-size-sm); cursor: pointer; transition: all 0.15s; }
.page-btn:hover { background: var(--color-surface-hover); }
.page-btn.active { border-color: var(--color-primary); background: var(--color-primary); color: var(--color-text-inverse); }
.svc-item { display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md) var(--spacing-lg); font-size: var(--font-size-sm); color: var(--color-text-primary); border: 1px solid transparent; border-radius: var(--radius-md); cursor: grab; transition: all 0.15s; }
    .svc-item:hover { border-color: var(--color-primary); background: var(--color-primary-light); }
    .svc-ic { width: 28px; height: 28px; display: flex; align-items: center; justify-content: border-radius: var(--radius-md); flex-shrink: 0; }
    .node-g { cursor: pointer; }
    .node-g:hover .n-shape { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12)); }
    .n-label { font-family: var(--font-sans); font-size: 12px; font-weight: var(--font-weight-medium); fill: var(--color-text-primary); text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .n-sub { font-family: var(--font-sans); font-size: 10px; fill: var(--color-text-secondary); text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .e-label { font-family: var(--font-sans); font-size: 10px; fill: var(--color-text-secondary); text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    </style>
</head>
<body>
<div style="display:flex; height:100vh; width:100vw; overflow:hidden;">

    <!-- SIDEBAR -->
    <aside style="width:var(--sidebar-width); background:var(--color-sidebar-bg); display:flex; flex-direction:column; flex-shrink:0; border-right:1px solid var(--color-sidebar-border);">
        <div style="height:56px; padding:0 var(--spacing-xl); display:flex; align-items:center; border-bottom:1px solid var(--color-sidebar-border);">
            <span style="color:var(--color-text-inverse); font-size:var(--font-size-lg); font-weight:var(--font-weight-semibold);">MetaPlatform</span>
        </div>
        <nav style="flex:1; overflow-y:auto; padding:var(--spacing-md) var(--spacing-md); display:flex; flex-direction:column; gap:1px;">
            <a class="nav-item" data-dom-id="nav-dashboard"><i data-lucide="layout-dashboard"></i><span>工作台</span></a>
            <a class="nav-item" data-dom-id="nav-superai"><i data-lucide="sparkles"></i><span>SuperAI</span></a>
            <a class="nav-item" data-dom-id="nav-architecture"><i data-lucide="building-2"></i><span>架构中心</span></a>
            <a class="nav-item" data-dom-id="nav-apps"><i data-lucide="app-window"></i><span>应用中心</span></a>
            <a class="nav-item" data-dom-id="nav-process" style="background: rgba(59,130,246,0.15); color: #60a5fa;"><i data-lucide="git-branch"></i><span>流程中心</span></a>
            <a class="nav-item" data-dom-id="nav-data"><i data-lucide="database"></i><span>数据中心</span></a>
            <a class="nav-item" data-dom-id="nav-ontology"><i data-lucide="brain"></i><span>本体引擎</span></a>
            <a class="nav-item" data-dom-id="nav-quality"><i data-lucide="shield-check"></i><span>质量中心</span></a>
            <a class="nav-item" data-dom-id="nav-knowledge"><i data-lucide="book-open"></i><span>知识库</span></a>
            <a class="nav-item" data-dom-id="nav-market"><i data-lucide="cloud"></i><span>云市场</span></a>
            <a class="nav-item" data-dom-id="nav-agents"><i data-lucide="bot"></i><span>数字员工</span></a>
            <a class="nav-item" data-dom-id="nav-admin"><i data-lucide="settings"></i><span>后台管理</span></a>
        </nav>
        <div style="padding:var(--spacing-lg) var(--spacing-xl); border-top:1px solid var(--color-sidebar-border); font-size:var(--font-size-xs); color:var(--color-sidebar-text);">
            v1.2 · 本体论驱动 AI 平台
        </div>
    </aside>

    <!-- MAIN AREA -->
    <div style="flex:1; display:flex; flex-direction:column; min-width:0;">

        <!-- TOPBAR -->
        <header style="height:56px; border-bottom:1px solid var(--color-border); background:var(--color-surface); display:flex; align-items:center; padding:0 var(--spacing-xl); flex-shrink:0; gap:var(--spacing-lg);">
            <div style="width:260px; display:flex; align-items:center; gap:var(--spacing-sm); padding:var(--spacing-sm) var(--spacing-lg); border:1px solid var(--color-border); border-radius:var(--radius-md); background:var(--color-bg-secondary); cursor:pointer;">
                <i data-lucide="search" style="width:14px; height:14px; color:var(--color-text-secondary);"></i>
                <span style="font-size:var(--font-size-sm); color:var(--color-text-secondary); flex:1;">搜索或 AI 助手</span>
                <span style="font-size:var(--font-size-xs); color:var(--color-text-secondary); background:var(--color-bg); padding:1px 4px; border-radius:var(--radius-sm); border:1px solid var(--color-border);">&#8984;K</span>
            </div>
            <div style="flex:1;"></div>
            <button style="position:relative; background:none; border:none; cursor:pointer; color:var(--color-text-secondary); padding:var(--spacing-sm);">
                <i data-lucide="bell" style="width:16px; height:16px;"></i>
                <span style="position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:var(--state-error); border-radius:var(--radius-full); border:1px solid var(--color-surface);"></span>
            </button>
            <div style="display:flex; align-items:center; gap:var(--spacing-sm); padding:var(--spacing-sm) var(--spacing-md); border:1px solid var(--color-border); border-radius:var(--radius-md); cursor:pointer; font-size:var(--font-size-sm); color:var(--color-text-primary);">
                <div style="width:22px; height:22px; border-radius:var(--radius-full); background:rgba(59,130,246,0.15); color:var(--color-primary); font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); display:flex; align-items:center; justify-content:center;">A</div>
                <span>Admin</span>
                <i data-lucide="chevron-down" style="width:12px; height:12px;"></i>
            </div>
        </header>

        <!-- TAB BAR -->
        <div style="border-bottom:1px solid var(--color-border); background:var(--color-surface); display:flex; padding:0 var(--spacing-xl); flex-shrink:0; overflow-x:auto;">
            <button class="tab-item" data-dom-id="tab-process-business">业务流程</button>
            <button class="tab-item" data-dom-id="tab-process-approval">审批流程</button>
            <button class="tab-item active" data-dom-id="tab-process-orchestration">服务编排</button>
            <button class="tab-item" data-dom-id="tab-process-instances">流程实例</button>
            <button class="tab-item" data-dom-id="tab-process-approvalcenter">审批中心</button>
            <button class="tab-item" data-dom-id="tab-process-triggers">触发器</button>
            <button class="tab-item" data-dom-id="tab-process-analytics">流程分析</button>
            <button class="tab-item" data-dom-id="tab-process-middleware">流程中台</button>
            <button class="tab-item" data-dom-id="tab-process-export">流程导出</button>
        </div>

        <!-- PAGE CONTENT -->
        <!-- Body: 3 columns -->
        <div style="flex:1; display:flex; min-height:0;">

            <!-- Left: Service List -->
            <div style="width:180px; border-right:1px solid var(--color-border); background:var(--color-bg-secondary); display:flex; flex-direction:column; flex-shrink:0;">
                <div style="padding:var(--spacing-lg) var(--spacing-lg) var(--spacing-sm);">
                    <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-semibold); color:var(--color-text-primary); letter-spacing:0.04em;">API 服务节点</div>
                </div>
                <div style="padding:0 var(--spacing-lg) var(--spacing-md); font-size:var(--font-size-xs); color:var(--color-text-secondary);">拖拽添加到画布</div>
                <div style="height:1px; background:var(--color-border); margin:0 var(--spacing-lg);"></div>
                <div style="flex:1; overflow-y:auto; padding:var(--spacing-sm) var(--spacing-md); display:flex; flex-direction:column; gap:2px;">
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:var(--color-primary-light); color:var(--color-primary);"><i data-lucide="user-check" style="width:16px; height:16px;"></i></div>
                        <span>用户验证</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:var(--state-success-bg); color:var(--state-success);"><i data-lucide="send" style="width:16px; height:16px;"></i></div>
                        <span>消息推送</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:var(--state-warning-bg); color:var(--state-warning);"><i data-lucide="file-text" style="width:16px; height:16px;"></i></div>
                        <span>数据转换</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:var(--state-error-bg); color:var(--state-error);"><i data-lucide="mail" style="width:16px; height:16px;"></i></div>
                        <span>邮件通知</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:#ede9fe; color:#8b5cf6;"><i data-lucide="database" style="width:16px; height:16px;"></i></div>
                        <span>数据查询</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:#fef3c7; color:#d97706;"><i data-lucide="repeat" style="width:16px; height:16px;"></i></div>
                        <span>条件路由</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:#e0f2fe; color:#0284c7;"><i data-lucide="globe" style="width:16px; height:16px;"></i></div>
                        <span>HTTP 调用</span>
                    </div>
                    <div class="svc-item" draggable="true">
                        <div class="svc-ic" style="background:#fce7f3; color:#db2777;"><i data-lucide="timer" style="width:16px; height:16px;"></i></div>
                        <span>延迟执行</span>
                    </div>
                </div>
            </div>

            <!-- Center: Canvas -->
            <div style="flex:1; background:var(--color-bg-secondary); position:relative; overflow:auto;">
                <svg viewBox="0 0 800 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="min-width:800px; min-height:400px; display:block;">
                    <defs>
                        <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
                            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--color-border)" stroke-width="0.4" opacity="0.5"/>
                        </pattern>
                        <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0,0 7,2.5 0,5" fill="var(--color-text-secondary)"/></marker>
                        <filter id="ds" x="-8%" y="-8%" width="116%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.06)"/></filter>
                    </defs>
                    <rect width="800" height="400" fill="url(#g)"/>

                    <!-- EDGES -->
                    <line x1="108" y1="200" x2="162" y2="200" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>
                    <line x1="288" y1="200" x2="342" y2="200" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>
                    <path d="M 458,172 C 478,140 498,110 520,100" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>
                    <path d="M 458,228 C 478,260 498,290 520,300" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>
                    <line x1="620" y1="100" x2="674" y2="100" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>
                    <line x1="620" y1="300" x2="674" y2="300" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>
                    <path d="M 740,128 C 750,180 750,220 740,272" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.2" marker-end="url(#ah)" opacity="0.6"/>

                    <!-- Edge labels -->
                    <rect x="462" y="126" width="56" height="18" rx="9" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="0.8"/>
                    <text x="490" y="137" class="e-label">成功</text>
                    <rect x="462" y="258" width="56" height="18" rx="9" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="0.8"/>
                    <text x="490" y="269" class="e-label">失败</text>

                    <!-- NODE: Start -->
                    <g class="node-g" transform="translate(80, 200)">
                        <circle r="26" fill="var(--state-success)" stroke="#16a34a" stroke-width="1.5" filter="url(#ds)"/>
                        <polygon points="-3,-5 -3,5 5,0" fill="var(--color-text-inverse)" style="pointer-events:none;"/>
                        <circle cx="26" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- NODE: 用户验证 -->
                    <g class="node-g" transform="translate(225, 200)">
                        <rect x="-60" y="-28" width="120" height="56" rx="6" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1.2" filter="url(#ds)"/>
                        <rect x="-60" y="-28" width="120" height="3" rx="6" fill="var(--color-primary)" opacity="0.15"/>
                        <text class="n-label" y="-3">用户验证</text>
                        <text class="n-sub" y="14">POST /auth</text>
                        <circle cx="-60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- NODE: 条件路由 -->
                    <g class="node-g" transform="translate(400, 200)">
                        <polygon points="0,-32 32,0 0,32 -32,0" fill="#fefce8" stroke="var(--state-warning)" stroke-width="1.5" filter="url(#ds)"/>
                        <text class="n-label" style="font-size:11px;" y="-3">结果</text>
                        <text class="n-sub" y="10" style="font-size:9px;">判断</text>
                        <circle cx="-32" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="0" cy="-32" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="0" cy="32" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="32" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- NODE: 消息推送 -->
                    <g class="node-g" transform="translate(570, 100)">
                        <rect x="-60" y="-28" width="120" height="56" rx="6" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1.2" filter="url(#ds)"/>
                        <rect x="-60" y="-28" width="120" height="3" rx="6" fill="var(--state-success)" opacity="0.2"/>
                        <text class="n-label" y="-3">消息推送</text>
                        <text class="n-sub" y="14">Webhook</text>
                        <circle cx="-60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- NODE: 邮件通知 -->
                    <g class="node-g" transform="translate(570, 300)">
                        <rect x="-60" y="-28" width="120" height="56" rx="6" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1.2" filter="url(#ds)"/>
                        <rect x="-60" y="-28" width="120" height="3" rx="6" fill="var(--state-error)" opacity="0.2"/>
                        <text class="n-label" y="-3">邮件通知</text>
                        <text class="n-sub" y="14">SMTP</text>
                        <circle cx="-60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- NODE: 数据存储 -->
                    <g class="node-g" transform="translate(710, 100)">
                        <rect x="-60" y="-28" width="120" height="56" rx="6" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1.2" filter="url(#ds)"/>
                        <rect x="-60" y="-28" width="120" height="3" rx="6" fill="#ede9fe"/>
                        <text class="n-label" y="-3">数据存储</text>
                        <text class="n-sub" y="14">INSERT DB</text>
                        <circle cx="-60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                        <circle cx="60" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- NODE: End -->
                    <g class="node-g" transform="translate(740, 300)">
                        <circle r="24" fill="var(--state-error)" stroke="#dc2626" stroke-width="1.5" filter="url(#ds)"/>
                        <rect x="-5" y="-5" width="10" height="10" rx="2" fill="var(--color-text-inverse)" opacity="0.8"/>
                        <circle cx="-24" cy="0" r="3" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="1" opacity="0.6"/>
                    </g>

                    <!-- Zoom -->
                    <g transform="translate(750, 370)" style="cursor:pointer;">
                        <rect x="-30" y="-10" width="60" height="20" rx="4" fill="var(--color-surface)" stroke="var(--color-border)" stroke-width="0.8" opacity="0.9"/>
                        <text x="-12" y="4" style="font-size:12px; fill:var(--color-text-secondary); pointer-events:none;">-</text>
                        <text x="12" y="4" style="font-size:12px; fill:var(--color-text-secondary); pointer-events:none;">+</text>
                    </g>
                </svg>
            </div>

            <!-- Right: Config Panel -->
            <div style="width:260px; border-left:1px solid var(--color-border); background:var(--color-surface); display:flex; flex-direction:column; flex-shrink:0;">
                <div style="padding:var(--spacing-lg) var(--spacing-xl); border-bottom:1px solid var(--color-border); display:flex; align-items:center; gap:var(--spacing-md);">
                    <i data-lucide="settings-2" style="width:14px; height:14px; color:var(--color-text-secondary);"></i>
                    <span style="font-size:var(--font-size-sm); font-weight:var(--font-weight-semibold); color:var(--color-text-primary);">节点配置</span>
                </div>
                <div style="margin:var(--spacing-lg); padding:var(--spacing-md) var(--spacing-lg); background:var(--color-primary-light); border:1px solid rgba(59,130,246,0.15); border-radius:var(--radius-md); display:flex; align-items:center; gap:var(--spacing-sm);">
                    <i data-lucide="zap" style="width:14px; height:14px; color:var(--color-primary);"></i>
                    <span style="font-size:var(--font-size-sm); font-weight:var(--font-weight-medium); color:var(--color-primary);">用户验证</span>
                </div>
                <div style="flex:1; overflow-y:auto; padding:var(--spacing-sm) var(--spacing-xl);">
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">节点名称</div>
                        <input type="text" value="用户验证" class="inp"/>
                    </div>
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">服务类型</div>
                        <select class="inp" style="cursor:pointer;">
                            <option>REST API</option>
                            <option>GraphQL</option>
                            <option>gRPC</option>
                            <option>内部服务</option>
                        </select>
                    </div>
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">请求地址</div>
                        <input type="text" value="https://api.example.com/auth" class="inp" style="font-family:var(--font-mono); font-size:var(--font-size-xs);"/>
                    </div>
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">请求方法</div>
                        <select class="inp" style="cursor:pointer;">
                            <option>POST</option>
                            <option>GET</option>
                            <option>PUT</option>
                            <option>DELETE</option>
                        </select>
                    </div>
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">超时设置</div>
                        <input type="text" value="5000ms" class="inp"/>
                    </div>
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">重试次数</div>
                        <input type="text" value="3" class="inp"/>
                    </div>
                    <div style="height:1px; background:var(--color-border); margin:var(--spacing-md) 0;"></div>
                    <div style="margin-bottom:var(--spacing-lg);">
                        <div style="font-size:var(--font-size-xs); font-weight:var(--font-weight-medium); color:var(--color-text-secondary); margin-bottom:var(--spacing-sm); text-transform:uppercase; letter-spacing:0.04em;">节点 ID</div>
                        <div style="font-family:var(--font-mono); font-size:var(--font-size-xs); color:var(--color-text-secondary); padding:6px 10px; background:var(--color-bg-secondary); border:1px solid var(--color-border); border-radius:var(--radius-md);">svc-node-001</div>
                    </div>
                </div>
                <div style="padding:var(--spacing-lg) var(--spacing-xl); border-top:1px solid var(--color-border); display:flex; gap:var(--spacing-sm);">
                    <button class="btn btn-ghost" style="flex:1; justify-content:center;">取消</button>
                    <button class="btn btn-primary" style="flex:2; justify-content:center;"><i data-lucide="check"></i> 应用</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
