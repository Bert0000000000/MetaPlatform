<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话 - MetaPlatform</title>
    <style id="theme-vars">
:root {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: var(--color-primary-subtle);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);
  --color-text-primary: #0f172a;
  --color-text-secondary: #64748b;
  --color-text-inverse: #ffffff;
  --color-border: #e2e8f0;
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 18px;
  --font-size-2xl: 22px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --line-height-normal: 1.5;
  --spacing-xs: 2px;
  --spacing-sm: 4px;
  --spacing-md: 8px;
  --spacing-lg: 12px;
  --spacing-xl: 16px;
  --spacing-2xl: 24px;
  --radius-sm: 3px;
  --radius-md: 4px;
  --radius-lg: 6px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.1);
  --sidebar-width: 220px;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="margin:0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; var(--font-size-base)">
<div class="flex min-h-screen">

  <!-- Sidebar (220px) -->
  <aside class="w-[220px] flex flex-col flex-shrink-0 fixed inset-y-0 left-0 z-10" style="background: var(--color-sidebar-bg);">

    <!-- Brand -->
    <div class="flex items-center gap-2.5 px-4 py-4 border-b" style="border-color: var(--color-sidebar-border);">
      <span class="w-7 h-7 text-white flex items-center justify-center font-bold text-xs" style="background: var(--color-primary); border-radius: var(--radius-lg);">M</span>
      <span class="text-sm font-semibold text-slate-100">MetaPlatform</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col px-3 py-3 gap-0.5 flex-1">

      <!-- 1. 页面配置 -->
      <a data-nav-key="dashboard" data-dom-id="nav-dashboard" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>页面配置</span>
      </a>

      <!-- 2. ObjectType -->
      <a data-nav-key="objecttype" data-dom-id="nav-objectmanager" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span>ObjectType</span>
      </a>

      <!-- 3. 建模范工场 -->
      <a data-nav-key="modeling-workshop" data-dom-id="nav-workshop" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
        <span>建模特工场</span>
      </a>

      <!-- 4. 设计器 -->
      <a data-nav-key="designer" data-dom-id="nav-designer" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
        <span>设计器</span>
      </a>

      <!-- 5. 流程设计器 -->
      <a data-nav-key="flow-designer" data-dom-id="nav-process" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="3" x2="6" y2="15"/>
          <circle cx="18" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
          <path d="M18 9a9 9 0 0 1-9 9"/>
        </svg>
        <span>流程设计器</span>
      </a>

      <!-- 6. AI 对话 (ACTIVE) -->
      <a data-nav-key="ai-dialogue" data-dom-id="nav-dialogue" data-active="true" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer" style="border-radius: var(--radius-lg); background: var(--color-sidebar-active-bg); color: var(--color-sidebar-active-text);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>AI 对话</span>
      </a>

      <!-- 7. 能力中心 -->
      <a data-nav-key="capability" data-dom-id="nav-capability" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>能力中心</span>
      </a>

      <!-- 8. 集成中心 -->
      <a data-nav-key="integration" data-dom-id="nav-integration" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="border-radius: var(--radius-lg); color: var(--color-sidebar-text);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span>集成中心</span>
      </a>

      <div style="border-top: 1px solid rgba(148,163,184,0.1); margin: 8px 12px;"></div>

      <!-- 页面预览 -->
      <a data-dom-id="nav-pageview" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-lg);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>页面预览</span>
      </a>

      <!-- 平台管理 -->
      <a data-dom-id="nav-admin" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-lg);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>平台管理</span>
      </a>

      <!-- 应用市场 -->
      <a data-dom-id="nav-market" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-lg);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>应用市场</span>
      </a>

      <!-- 计费中心 -->
      <a data-dom-id="nav-billing" class="flex items-center gap-2.5 px-2.5 py-2 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-lg);" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='var(--color-sidebar-text-hover)'" onmouseout="this.style.background='transparent';this.style.color='var(--color-sidebar-text)'">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        <span>计费中心</span>
      </a>

    </nav>

    <!-- Bottom user area -->
    <div class="px-3 py-3 border-t flex items-center gap-2.5" style="border-color: var(--color-sidebar-border);">
      <div class="w-6 h-6 flex items-center justify-center text-[10px] font-medium" style="background: var(--color-sidebar-bg); color: var(--color-sidebar-text); border-radius: var(--radius-full);">A</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-slate-200 truncate">Admin</div>
      </div>
    </div>

  </aside>

  <!-- Main content -->
  <main class="flex-1 ml-[220px] min-w-0" style="background: var(--color-bg);">

    <div class="flex h-screen">

      <!-- Session sidebar (220px) -->
      <div class="w-[220px] flex flex-col flex-shrink-0 border-r" style="background: var(--color-bg-secondary); border-color: var(--color-border);">

        <!-- New conversation button -->
        <div class="px-3 py-3">
          <button class="w-full flex items-center justify-center gap-1.5 px-3 py-1.5 text-white cursor-pointer transition-colors" style="background: var(--color-primary); border-radius: var(--radius-lg); var(--font-size-xs) font-weight: var(--font-weight-medium);" onmouseover="this.style.background='var(--color-primary-hover)'" onmouseout="this.style.background='var(--color-primary)'">
            <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新建对话
          </button>
        </div>

        <!-- Session list -->
        <div class="flex-1 overflow-y-auto px-2 pb-3">
          <div class="flex flex-col gap-0.5">

            <!-- Session 1 (active) -->
            <button class="w-full text-left px-2.5 py-2 cursor-pointer" style="border-radius: var(--radius-lg); background: var(--color-surface); border-left: 2px solid var(--color-primary);">
              <div class="truncate" style="var(--font-size-sm) font-weight: var(--font-weight-medium); color: var(--color-text-primary);">客户数据查询</div>
              <div class="truncate mt-0.5" style="var(--font-size-xs) color: var(--color-text-secondary); opacity: 0.4;">07/03 09:15</div>
            </button>

            <!-- Session 2 -->
            <button class="w-full text-left px-2.5 py-2 cursor-pointer border-l-2 border-transparent transition-colors" style="border-radius: var(--radius-lg);" onmouseover="this.style.background='var(--color-surface)'" onmouseout="this.style.background='transparent'">
              <div class="truncate" style="var(--font-size-sm) font-weight: var(--font-weight-medium); color: var(--color-text-secondary);">工单状态分析</div>
              <div class="truncate mt-0.5" style="var(--font-size-xs) color: var(--color-text-secondary); opacity: 0.4;">07/03 08:30</div>
            </button>

            <!-- Session 3 -->
            <button class="w-full text-left px-2.5 py-2 cursor-pointer border-l-2 border-transparent transition-colors" style="border-radius: var(--radius-lg);" onmouseover="this.style.background='var(--color-surface)'" onmouseout="this.style.background='transparent'">
              <div class="truncate" style="var(--font-size-sm) font-weight: var(--font-weight-medium); color: var(--color-text-secondary);">产品推荐策略</div>
              <div class="truncate mt-0.5" style="var(--font-size-xs) color: var(--color-text-secondary); opacity: 0.4;">07/02 17:45</div>
            </button>

          </div>
        </div>

      </div>

      <!-- Chat main area -->
      <div class="flex-1 flex flex-col min-w-0">

        <!-- Messages area -->
        <div class="flex-1 overflow-y-auto p-4" style="scrollbar-gutter: stable;">

          <div class="flex flex-col gap-3 max-w-[720px] mx-auto">

            <!-- Turn 1: User -->
            <div class="flex justify-end">
              <div class="max-w-[70%] flex flex-col items-end">
                <div class="px-3 py-1.5 text-white" style="background: var(--color-primary); border-radius: var(--radius-lg); var(--font-size-base)">
                  帮我查询本月新增的客户数据
                </div>
                <div class="mt-0.5" style="var(--font-size-xs) opacity: 0.4; color: var(--color-text-secondary);">09:15</div>
              </div>
            </div>

            <!-- Turn 1: Assistant -->
            <div class="flex justify-start">
              <div class="max-w-[70%] flex flex-col items-start">
                <div class="px-3 py-1.5" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); var(--font-size-base) color: var(--color-text-primary);">
                  好的，我来为您查询本月新增的客户数据。请稍等...
                </div>
                <div class="mt-0.5" style="var(--font-size-xs) opacity: 0.4; color: var(--color-text-secondary);">09:15</div>
              </div>
            </div>

            <!-- Turn 2: User -->
            <div class="flex justify-end">
              <div class="max-w-[70%] flex flex-col items-end">
                <div class="px-3 py-1.5 text-white" style="background: var(--color-primary); border-radius: var(--radius-lg); var(--font-size-base)">
                  按行业分布来看一下
                </div>
                <div class="mt-0.5" style="var(--font-size-xs) opacity: 0.4; color: var(--color-text-secondary);">09:16</div>
              </div>
            </div>

            <!-- Turn 2: Assistant -->
            <div class="flex justify-start">
              <div class="max-w-[70%] flex flex-col items-start">
                <div class="px-3 py-1.5" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); var(--font-size-base) color: var(--color-text-primary);">
                  以下是本月新增客户的行业分布：
                  <br><br>
                  信息技术 — 18 家（40%）
                  <br>
                  金融服务 — 12 家（26.7%）
                  <br>
                  制造业 — 8 家（17.8%）
                  <br>
                  零售电商 — 5 家（11.1%）
                  <br>
                  其他 — 2 家（4.4%）
                </div>
                <!-- Suggestion chips -->
                <div class="flex flex-wrap gap-1.5 mt-1.5">
                  <button class="px-2.5 py-1 transition-colors cursor-pointer whitespace-nowrap" style="var(--font-size-xs) border: 1px solid var(--color-border); border-radius: var(--radius-lg); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='var(--color-bg-secondary)'" onmouseout="this.style.background='transparent'">查看详情</button>
                  <button class="px-2.5 py-1 transition-colors cursor-pointer whitespace-nowrap" style="var(--font-size-xs) border: 1px solid var(--color-border); border-radius: var(--radius-lg); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='var(--color-bg-secondary)'" onmouseout="this.style.background='transparent'">导出报表</button>
                  <button class="px-2.5 py-1 transition-colors cursor-pointer whitespace-nowrap" style="var(--font-size-xs) border: 1px solid var(--color-border); border-radius: var(--radius-lg); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='var(--color-bg-secondary)'" onmouseout="this.style.background='transparent'">设置告警</button>
                </div>
                <div class="mt-0.5" style="var(--font-size-xs) opacity: 0.4; color: var(--color-text-secondary);">09:16</div>
              </div>
            </div>

          </div>

        </div>

        <!-- Input bar -->
        <div class="border-t p-3" style="border-color: var(--color-border);">
          <div class="flex items-end gap-2 max-w-[720px] mx-auto">
            <textarea rows="1" placeholder="输入消息..." class="flex-1 border resize-none outline-none transition-shadow" style="background: var(--color-bg-secondary); border-color: var(--color-border); border-radius: var(--radius-md); padding: 6px 12px; var(--font-size-sm) color: var(--color-text-primary); min-height: 36px; max-height: 120px;" onfocus="this.style.borderColor='var(--color-primary)'" onblur="this.style.borderColor='var(--color-border)'"></textarea>
            <button class="flex items-center justify-center h-8 px-4 text-white whitespace-nowrap cursor-pointer transition-colors flex-shrink-0" style="background: var(--color-primary); border-radius: var(--radius-md); var(--font-size-xs) font-weight: var(--font-weight-medium);" onmouseover="this.style.background='var(--color-primary-hover)'" onmouseout="this.style.background='var(--color-primary)'">
              发送
            </button>
          </div>
        </div>

      </div>

    </div>

  </main>

</div>
