<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用市场 - MetaPlatform</title>
    <style id="theme-vars">
:root {
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: var(--color-primary-subtle);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);
  --color-text-primary: #0f172a;
  --color-text-secondary: #64748b;
  --color-text-inverse: #ffffff;
  --color-border: #e2e8f0;
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 18px;
  --font-size-2xl: 22px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --line-height-normal: 1.5;
  --spacing-xs: 2px;
  --spacing-sm: 4px;
  --spacing-md: 8px;
  --spacing-lg: 12px;
  --spacing-xl: 16px;
  --spacing-2xl: 24px;
  --radius-sm: 3px;
  --radius-md: 4px;
  --radius-lg: 6px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.1);
  --sidebar-width: 220px;
}
</style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] { display: inline-flex; align-items: center; justify-content: center; -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; background-color: currentColor; }
    </style>
</head>
<body style="font-family: var(--font-sans); var(--font-size-base) background: var(--color-bg); color: var(--color-text-primary);">
<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="flex flex-col flex-shrink-0 fixed inset-y-0 left-0 z-10" style="width: 220px; background: var(--color-sidebar-bg);">

    <!-- Brand -->
    <div class="flex items-center gap-2 px-4 py-4" style="border-bottom: 1px solid var(--color-sidebar-border);">
      <span class="w-7 h-7 flex items-center justify-center font-bold text-xs" style="border-radius: var(--radius-md); background: var(--color-primary); color: var(--color-text-inverse);">M</span>
      <span class="text-sm font-semibold" style="color: var(--color-text-inverse);">MetaPlatform</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col px-2 py-3 gap-0.5 flex-1">

      <!-- 1. 页面配置 -->
      <a data-nav-key="dashboard" data-dom-id="nav-dashboard" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>页面配置</span>
      </a>

      <!-- 2. ObjectType -->
      <a data-nav-key="objecttype" data-dom-id="nav-objectmanager" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span>ObjectType</span>
      </a>

      <!-- 3. 建模范工场 -->
      <a data-nav-key="modeling-workshop" data-dom-id="nav-workshop" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
        <span>建模范工场</span>
      </a>

      <!-- 4. 设计器 -->
      <a data-nav-key="designer" data-dom-id="nav-designer" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
        <span>设计器</span>
      </a>

      <!-- 5. 流程设计器 -->
      <a data-nav-key="flow-designer" data-dom-id="nav-process" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="3" x2="6" y2="15"/>
          <circle cx="18" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
          <path d="M18 9a9 9 0 0 1-9 9"/>
        </svg>
        <span>流程设计器</span>
      </a>

      <!-- 6. AI 对话 -->
      <a data-nav-key="dialogue" data-dom-id="nav-dialogue" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>AI 对话</span>
      </a>

      <!-- 7. 能力中心 -->
      <a data-nav-key="capability" data-dom-id="nav-capability" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>能力中心</span>
      </a>

      <!-- 8. 集成中心 -->
      <a data-nav-key="integration" data-dom-id="nav-integration" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span>集成中心</span>
      </a>

      <!-- Divider -->
      <div class="my-2" style="height: 1px; background: var(--color-sidebar-border);"></div>

      <!-- 9. 页面预览 -->
      <a data-nav-key="pageview" data-dom-id="nav-pageview" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>页面预览</span>
      </a>

      <!-- 10. 平台管理 -->
      <a data-nav-key="admin" data-dom-id="nav-admin" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>平台管理</span>
      </a>

      <!-- 11. 应用市场 (active) -->
      <a data-nav-key="market" data-dom-id="nav-market" data-active="true" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-active-text); background: var(--color-sidebar-active-bg); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span>应用市场</span>
      </a>

      <!-- 12. 计费中心 -->
      <a data-nav-key="billing" data-dom-id="nav-billing" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        <span>计费中心</span>
      </a>

    </nav>

    <!-- Bottom user area -->
    <div class="px-3 py-3 flex items-center gap-2" style="border-top: 1px solid var(--color-sidebar-border);">
      <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-medium" style="background: var(--color-sidebar-bg); color: var(--color-sidebar-text-hover);">A</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs truncate" style="color: var(--color-sidebar-text-hover);">Admin</div>
        <div style="var(--font-size-xs) color: var(--color-text-secondary);" class="truncate">admin@metaplatform.io</div>
      </div>
    </div>

  </aside>

  <!-- Main content -->
  <main class="flex-1 min-w-0 p-5" style="margin-left: 220px; background: var(--color-bg);">

    <!-- Page header -->
    <div class="flex items-center justify-between mb-5">
      <h1 style="var(--font-size-xl) font-weight: var(--font-weight-semibold); color: var(--color-text-primary); line-height: var(--line-height-normal);">应用市场</h1>
      <!-- Search input -->
      <div class="relative" style="width: 280px;">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="搜索模板..." class="w-full outline-none" style="font-size: var(--font-size-base); padding: 6px 8px 6px 28px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); color: var(--color-text-primary);" onfocus="this.style.borderColor='var(--color-primary)';this.style.boxShadow='0 0 0 2px var(--color-primary-light)'" onblur="this.style.borderColor='var(--color-border)';this.style.boxShadow='none'">
      </div>
    </div>

    <!-- Category filter bar -->
    <div class="flex items-center gap-2 mb-5">
      <!-- 全部 (active) -->
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-sm); padding: 4px 14px; border-radius: var(--radius-full); background: var(--color-primary); color: var(--color-text-inverse); border: 1px solid var(--color-primary);">全部</button>
      <!-- 制造 -->
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-sm); padding: 4px 14px; border-radius: var(--radius-full); background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-text-secondary)'">制造</button>
      <!-- 医疗 -->
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-sm); padding: 4px 14px; border-radius: var(--radius-full); background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-text-secondary)'">医疗</button>
      <!-- 金融 -->
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-sm); padding: 4px 14px; border-radius: var(--radius-full); background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-text-secondary)'">金融</button>
      <!-- 零售 -->
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-sm); padding: 4px 14px; border-radius: var(--radius-full); background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-text-secondary)'">零售</button>
      <!-- 通用 -->
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-sm); padding: 4px 14px; border-radius: var(--radius-full); background: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border);" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-text-secondary)'">通用</button>
    </div>

    <!-- Template card grid -->
    <div class="grid gap-4" style="grid-template-columns: repeat(3, 1fr);">

      <!-- Card 1: 制造管理 -->
      <div class="flex flex-col transition-colors" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
        <!-- Icon area -->
        <div class="flex items-center justify-center" style="height: 100px; background: var(--color-bg-secondary);">
          <svg class="w-10 h-10" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/>
            <path d="M17 18h1"/>
            <path d="M12 18h1"/>
            <path d="M7 18h1"/>
          </svg>
        </div>
        <!-- Card body -->
        <div class="flex flex-col gap-2 p-3 flex-1">
          <!-- Tag + Title -->
          <div class="flex items-center gap-2">
            <span style="font-size: var(--font-size-xs); padding: 1px 6px; border-radius: var(--radius-full); background: var(--color-primary-light); color: var(--color-primary);">制造</span>
          </div>
          <h3 style="font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); color: var(--color-text-primary);">制造管理</h3>
          <p style="font-size: var(--font-size-sm); color: var(--color-text-secondary); line-height: var(--line-height-normal);">制造行业全流程管理方案</p>
        </div>
        <!-- Card footer -->
        <div class="flex items-center justify-between p-3" style="border-top: 1px solid var(--color-border);">
          <span style="font-size: var(--font-size-xs); color: var(--color-text-secondary);">8 个对象</span>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-xs); padding: 4px 12px; border-radius: var(--radius-md); background: var(--color-primary); color: var(--color-text-inverse);" onmouseover="this.style.background='var(--color-primary-hover)'" onmouseout="this.style.background='var(--color-primary)'">安装</button>
        </div>
      </div>

      <!-- Card 2: 医疗健康 -->
      <div class="flex flex-col transition-colors" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
        <!-- Icon area -->
        <div class="flex items-center justify-center" style="height: 100px; background: var(--color-bg-secondary);">
          <svg class="w-10 h-10" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <!-- Card body -->
        <div class="flex flex-col gap-2 p-3 flex-1">
          <div class="flex items-center gap-2">
            <span style="font-size: var(--font-size-xs); padding: 1px 6px; border-radius: var(--radius-full); background: var(--color-primary-light); color: var(--color-primary);">医疗</span>
          </div>
          <h3 style="font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); color: var(--color-text-primary);">医疗健康</h3>
          <p style="font-size: var(--font-size-sm); color: var(--color-text-secondary); line-height: var(--line-height-normal);">医疗健康信息管理系统</p>
        </div>
        <!-- Card footer -->
        <div class="flex items-center justify-between p-3" style="border-top: 1px solid var(--color-border);">
          <span style="font-size: var(--font-size-xs); color: var(--color-text-secondary);">6 个对象</span>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: var(--font-size-xs); padding: 4px 12px; border-radius: var(--radius-md); background: var(--color-primary); color: var(--color-text-inverse);" onmouseover="this.style.background='var(--color-primary-hover)'" onmouseout="this.style.background='var(--color-primary)'">安装</button>
        </div>
