<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>

    <style id="theme-vars">
/* ============================================================
 * MetaPlatform Design — Brand CSS
 * Enterprise low-code platform: calm, trustworthy, data-rich
 * ============================================================ */

/* ---- Brand Prefix: mp ---- */

/* ---- Color System ---- */
:root {
  /* Primary: Indigo Blue — enterprise trust */
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;
  --color-primary-muted: #bfdbfe;

  /* Neutral Scale */
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-bg-tertiary: #f1f5f9;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;

  /* Sidebar — dark navy */
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: rgba(59, 130, 246, 0.15);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);

  /* Text */
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94a3b8;
  --color-text-inverse: #ffffff;

  /* Borders */
  --color-border: #e2e8f0;
  --color-border-light: #f1f5f9;

  /* State Colors */
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;
  --state-info: #3b82f6;
  --state-info-bg: #eff6ff;

  /* Accent tints for categories */
  --tint-ai: #8b5cf6;
  --tint-ai-bg: #f5f3ff;
  --tint-data: #06b6d4;
  --tint-data-bg: #ecfeff;
  --tint-tool: #f59e0b;
  --tint-tool-bg: #fffbeb;
  --tint-rest: #3b82f6;
  --tint-rest-bg: #eff6ff;
  --tint-database: #22c55e;
  --tint-database-bg: #f0fdf4;
  --tint-csv: #f59e0b;
  --tint-csv-bg: #fffbeb;

  /* ---- Typography ---- */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 24px;
  --font-size-3xl: 30px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --line-height-tight: 1.25;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.625;

  /* ---- Spacing ---- */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
  --spacing-3xl: 48px;

  /* ---- Radius ---- */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 9999px;

  /* ---- Shadows (border-first, low alpha) ---- */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.12);

  /* ---- Layout ---- */
  --sidebar-width: 240px;
  --content-max-width: 1200px;
  --header-height: 56px;
}

/* ---- Typography Scale Classes ---- */
.mp-h1 { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); color: var(--color-text-primary); letter-spacing: -0.02em; }
.mp-h2 { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); color: var(--color-text-primary); letter-spacing: -0.01em; }
.mp-h3 { font-size: var(--font-size-xl); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); color: var(--color-text-primary); }
.mp-h4 { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); color: var(--color-text-primary); }
.mp-body { font-size: var(--font-size-base); font-weight: var(--font-weight-normal); line-height: var(--line-height-normal); color: var(--color-text-secondary); }
.mp-caption { font-size: var(--font-size-sm); font-weight: var(--font-weight-normal); line-height: var(--line-height-normal); color: var(--color-text-tertiary); }
.mp-code { font-family: var(--font-mono); font-size: var(--font-size-sm); }

/* ---- Component Surfaces ---- */
.mp-surface { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); }
.mp-surface-raised { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="font-family: var(--font-sans); background: var(--color-bg);">

      <a data-nav-key="dialogue" data-dom-id="nav-dialogue" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors" style="color: var(--color-sidebar-text);">

      <!-- 8. 集成中心 (active) -->

        <div class="flex-1 min-w-0">

            <span class="text-xs font-mono" style="color: var(--color-text-tertiary);">conn_csv_product</span>
            <span class="inline-flex items-center gap-1.5 text-xs font-medium" style="color: var(--state-error);">
              <span class="w-1.5 h-1.5 rounded-full inline-block" style="background: var(--state-error);"></span>
              异常
            </span>
          </div>
        </div>
        <!-- Actions -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <button class="inline-flex items-center justify-center whitespace-nowrap text-xs font-medium px-3 py-1.5 transition-colors" style="border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='var(--color-bg-tertiary)'" onmouseout="this.style.background='transparent'">测试连接</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap text-xs font-medium px-3 py-1.5 transition-colors" style="border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='var(--color-bg-tertiary)'" onmouseout="this.style.background='transparent'">同步</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap text-xs font-medium px-3 py-1.5 transition-colors" style="border: none; border-radius: var(--radius-md); color: var(--state-error); background: transparent;" onmouseover="this.style.background='var(--state-error-bg)'" onmouseout="this.style.background='transparent'">删除</button>
        </div>
      </div>

      <!-- Empty state placeholder -->
      <div class="flex items-center justify-center p-6 transition-colors cursor-pointer" style="border: 2px dashed var(--color-border); border-radius: var(--radius-md); background: transparent;" onmouseover="this.style.borderColor='var(--color-primary-muted)'; this.style.background='var(--color-primary-light)'" onmouseout="this.style.borderColor='var(--color-border)'; this.style.background='transparent'">
        <span class="text-sm font-medium" style="color: var(--color-text-tertiary);">+ 添加新连接器</span>
      </div>

    </div>

  </main>

</div>
</body>
</html>
