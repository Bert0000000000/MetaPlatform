<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集成中心 — MetaPlatform</title>
    <style id="theme-vars">
/* ============================================================
 * MetaPlatform Design — Draft (精简版)
 * Compact, minimal, small-radius enterprise style
 * ============================================================ */

/* ---- Brand Prefix: mp ---- */

:root {
  /* Primary */
  --color-primary: #3b82f6;
  --color-primary-hover: #2563eb;
  --color-primary-light: #eff6ff;

  /* Neutral — minimal set */
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;
  --color-surface: #ffffff;
  --color-surface-hover: #f8fafc;

  /* Sidebar */
  --color-sidebar-bg: #0f172a;
  --color-sidebar-text: #94a3b8;
  --color-sidebar-text-hover: #cbd5e1;
  --color-sidebar-active-bg: rgba(59, 130, 246, 0.15);
  --color-sidebar-active-text: #60a5fa;
  --color-sidebar-border: rgba(148, 163, 184, 0.1);

  /* Text — 3 levels only */
  --color-text-primary: #0f172a;
  --color-text-secondary: #64748b;
  --color-text-inverse: #ffffff;

  /* Border — 1 token only */
  --color-border: #e2e8f0;

  /* State — 3 semantic colors, bg derived */
  --state-success: #22c55e;
  --state-success-bg: #f0fdf4;
  --state-warning: #f59e0b;
  --state-warning-bg: #fffbeb;
  --state-error: #ef4444;
  --state-error-bg: #fef2f2;

  /* ---- Typography ---- */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 18px;
  --font-size-2xl: 22px;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;

  --line-height-normal: 1.5;

  /* ---- Spacing — compact scale ---- */
  --spacing-xs: 2px;
  --spacing-sm: 4px;
  --spacing-md: 8px;
  --spacing-lg: 12px;
  --spacing-xl: 16px;
  --spacing-2xl: 24px;

  /* ---- Radius — SMALL ---- */
  --radius-sm: 3px;
  --radius-md: 4px;
  --radius-lg: 6px;
  --radius-full: 9999px;

  /* ---- Shadows — minimal ---- */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.1);

  /* ---- Layout ---- */
  --sidebar-width: 220px;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body style="font-family: var(--font-sans); font-size: 13px; background: var(--color-bg); color: var(--color-text-primary);">
<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="flex flex-col flex-shrink-0 fixed inset-y-0 left-0 z-10" style="width: 220px; background: var(--color-sidebar-bg);">

    <!-- Brand -->
    <div class="flex items-center gap-2 px-4 py-4" style="border-bottom: 1px solid var(--color-sidebar-border);">
      <span class="w-7 h-7 flex items-center justify-center font-bold text-xs" style="border-radius: var(--radius-md); background: var(--color-primary); color: var(--color-text-inverse);">M</span>
      <span class="text-sm font-semibold" style="color: #f8fafc;">MetaPlatform</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col px-2 py-3 gap-0.5 flex-1">

      <!-- 1. 页面配置 -->
      <a data-nav-key="dashboard" data-dom-id="nav-dashboard" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>页面配置</span>
      </a>

      <!-- 2. ObjectType -->
      <a data-nav-key="objecttype" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span>ObjectType</span>
      </a>

      <!-- 3. 建模特工场 -->
      <a data-nav-key="modeling-workshop" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
        <span>建模特工场</span>
      </a>

      <!-- 4. 设计器 -->
      <a data-nav-key="designer" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
        <span>设计器</span>
      </a>

      <!-- 5. 流程设计器 -->
      <a data-nav-key="flow-designer" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="3" x2="6" y2="15"/>
          <circle cx="18" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
          <path d="M18 9a9 9 0 0 1-9 9"/>
        </svg>
        <span>流程设计器</span>
      </a>

      <!-- 6. AI 对话 -->
      <a data-nav-key="dialogue" data-dom-id="nav-dialogue" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>AI 对话</span>
      </a>

      <!-- 7. 能力中心 -->
      <a data-nav-key="capability" data-dom-id="nav-capability" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-text); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>能力中心</span>
      </a>

      <!-- 8. 集成中心 (active) -->
      <a data-nav-key="integration" data-active="true" class="flex items-center gap-2.5 px-3 py-1.5 text-xs cursor-pointer transition-colors" style="color: var(--color-sidebar-active-text); background: var(--color-sidebar-active-bg); border-radius: var(--radius-md);">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        <span>集成中心</span>
      </a>

    </nav>

    <!-- Bottom user area -->
    <div class="px-3 py-3 flex items-center gap-2" style="border-top: 1px solid var(--color-sidebar-border);">
      <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-medium" style="background: #334155; color: #cbd5e1;">A</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs truncate" style="color: #e2e8f0;">Admin</div>
        <div style="font-size: 10px; color: #64748b;" class="truncate">admin@metaplatform.io</div>
      </div>
    </div>

  </aside>

  <!-- Main content -->
  <main class="flex-1 min-w-0 p-5" style="margin-left: 220px; background: var(--color-bg);">

    <!-- Page header — compact -->
    <div class="flex items-center justify-between mb-4">
      <h1 style="font-size: 18px; font-weight: var(--font-weight-semibold); color: var(--color-text-primary); line-height: var(--line-height-normal);">集成中心</h1>
      <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 6px 12px; border-radius: var(--radius-md); background: var(--color-primary); color: var(--color-text-inverse);" onmouseover="this.style.background='var(--color-primary-hover)'" onmouseout="this.style.background='var(--color-primary)'">
        + 新建连接器
      </button>
    </div>

    <!-- Connector card list -->
    <div class="flex flex-col gap-2">

      <!-- Card 1: CRM API (REST, connected) -->
      <div class="flex items-center gap-3 p-3 transition-colors" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
        <!-- Icon — neutral bg -->
        <div class="w-8 h-8 flex items-center justify-center flex-shrink-0" style="background: #f1f5f9; border-radius: var(--radius-md);">
          <svg class="w-4 h-4" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span style="font-size: 13px; font-weight: var(--font-weight-medium); color: var(--color-text-primary);">CRM API</span>
            <span style="font-size: 11px; color: var(--color-text-secondary);">REST</span>
          </div>
          <span class="font-mono" style="font-size: 11px; color: var(--color-text-secondary);">conn_crm_01</span>
        </div>
        <!-- Status -->
        <div class="flex items-center gap-1.5 flex-shrink-0">
          <span class="w-1.5 h-1.5 rounded-full inline-block" style="background: var(--state-success);"></span>
          <span style="font-size: 11px; color: var(--color-text-secondary);">已连接</span>
        </div>
        <!-- Actions -->
        <div class="flex items-center gap-1 flex-shrink-0">
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">测试连接</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">同步</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: none; color: var(--state-error); background: transparent;" onmouseover="this.style.background='var(--state-error-bg)'" onmouseout="this.style.background='transparent'">删除</button>
        </div>
      </div>

      <!-- Card 2: 数据仓库 (Database, connected) -->
      <div class="flex items-center gap-3 p-3 transition-colors" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
        <!-- Icon — neutral bg -->
        <div class="w-8 h-8 flex items-center justify-center flex-shrink-0" style="background: #f1f5f9; border-radius: var(--radius-md);">
          <svg class="w-4 h-4" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
        </div>
        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span style="font-size: 13px; font-weight: var(--font-weight-medium); color: var(--color-text-primary);">数据仓库</span>
            <span style="font-size: 11px; color: var(--color-text-secondary);">Database</span>
          </div>
          <span class="font-mono" style="font-size: 11px; color: var(--color-text-secondary);">conn_db_warehouse</span>
        </div>
        <!-- Status -->
        <div class="flex items-center gap-1.5 flex-shrink-0">
          <span class="w-1.5 h-1.5 rounded-full inline-block" style="background: var(--state-success);"></span>
          <span style="font-size: 11px; color: var(--color-text-secondary);">已连接</span>
        </div>
        <!-- Actions -->
        <div class="flex items-center gap-1 flex-shrink-0">
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">测试连接</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">同步</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: none; color: var(--state-error); background: transparent;" onmouseover="this.style.background='var(--state-error-bg)'" onmouseout="this.style.background='transparent'">删除</button>
        </div>
      </div>

      <!-- Card 3: 产品CSV导入 (CSV, error) -->
      <div class="flex items-center gap-3 p-3 transition-colors" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
        <!-- Icon — neutral bg -->
        <div class="w-8 h-8 flex items-center justify-center flex-shrink-0" style="background: #f1f5f9; border-radius: var(--radius-md);">
          <svg class="w-4 h-4" style="color: var(--color-text-secondary);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span style="font-size: 13px; font-weight: var(--font-weight-medium); color: var(--color-text-primary);">产品CSV导入</span>
            <span style="font-size: 11px; color: var(--color-text-secondary);">CSV</span>
          </div>
          <span class="font-mono" style="font-size: 11px; color: var(--color-text-secondary);">conn_csv_product</span>
        </div>
        <!-- Status — error -->
        <div class="flex items-center gap-1.5 flex-shrink-0">
          <span class="w-1.5 h-1.5 rounded-full inline-block" style="background: var(--state-error);"></span>
          <span style="font-size: 11px; color: var(--color-text-secondary);">异常</span>
        </div>
        <!-- Actions -->
        <div class="flex items-center gap-1 flex-shrink-0">
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">测试连接</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: 1px solid var(--color-border); color: var(--color-text-secondary); background: transparent;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">同步</button>
          <button class="inline-flex items-center justify-center whitespace-nowrap font-medium transition-colors" style="font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); border: none; color: var(--state-error); background: transparent;" onmouseover="this.style.background='var(--state-error-bg)'" onmouseout="this.style.background='transparent'">删除</button>
        </div>
      </div>

    </div>

  </main>

</div>
</body>
</html>
