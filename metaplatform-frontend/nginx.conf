# nginx configuration for a single MetaPlatform frontend app.
# Used by the `prod` stage of the Dockerfile.
#
# - History API (SPA) fallback: every unknown path goes back to /index.html
# - Static asset caching for /assets/*
# - Proxy /api to the platform backend (host gateway by default)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain 