server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/entity-types { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/object-types { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/object-instances { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/nl-modeling { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/knowledge { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/dialogue { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/capabilities { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/integration { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/security { proxy_pass http://ontology-engine:8090; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/page { proxy_pass http://page-generator:8083; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
