version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: mp-ai-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ai_substrate
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: metaplatform
    volumes:
      - pg-ai-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mp-ai-redis
    ports:
      - "6381:6379"
    volumes:
      - redis-ai-data:/data

volumes:
  pg-ai-data:
  redis-ai-data:
