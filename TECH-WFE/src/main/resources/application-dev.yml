spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/metaplatform_wfe
    username: ${DB_USERNAME:meta}
    password: ${DB_PASSWORD:meta}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

flowable:
  database-schema-update: true
  async-executor-activate: false
  history-level: full

app:
  jwt:
    secret: ${JWT_SECRET:mate-platform-default-secret-key-must-be-over-32-bytes}
