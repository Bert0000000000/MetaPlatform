spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/metaplatform_mcp
    username: ${DB_USERNAME:meta}
    password: ${DB_PASSWORD:meta}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mcp:
  builtin:
    ont-base-url: ${ONT_BASE_URL:http://localhost:8201}
    rag-base-url: ${RAG_BASE_URL:http://localhost:8901}
    action-base-url: ${ACTION_BASE_URL:http://localhost:8104}
