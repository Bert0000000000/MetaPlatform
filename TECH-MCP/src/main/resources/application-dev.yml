spring:
  datasource:
    url: jdbc:h2:mem:metaplatform_mcp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  h2:
    console:
      enabled: true
      path: /h2-console

mcp:
  builtin:
    ont-base-url: ${ONT_BASE_URL:http://localhost:8201}
    rag-base-url: ${RAG_BASE_URL:http://localhost:8901}
    action-base-url: ${ACTION_BASE_URL:http://localhost:8104}
