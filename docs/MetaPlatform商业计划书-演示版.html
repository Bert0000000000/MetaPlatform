<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        :root {
            --bg-primary: #05070a;
            --bg-secondary: #0a0f17;
            --bg-card: #0d1320;
            --accent-cyan: #00f0ff;
            --accent-blue: #0066ff;
            --accent-purple: #7c3aed;
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans SC', sans-serif;

            color: var(--text-primary);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb {

            border-radius: 4px;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
        }
        .grid-pattern {
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            position: absolute; inset: 0; pointer-events: none;
        }
        .gradient-text {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradient-shift 6s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
        .section {
            min-height: 100vh;
            position: relative;
            display: flex;

            justify-content: center;
            padding: 80px 24px;
        }
        .section-content { max-width: 1400px; width: 100%; position: relative; z-index: 10; }
        .glass-card {
            background: rgba(13, 19, 32, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {

            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 240, 255, 0.1);
        }
        .stat-number { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 3rem; line-height: 1; }
        .layer-node {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 102, 255, 0.1));
            border: 1px solid rgba(0, 240, 255, 0.3);

            padding: 12px 16px;

            font-size: 0.85rem;

        .nav-dot {

        .scanline {
            position: fixed; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(180deg, transparent, rgba(0, 240, 255, 0.1), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none; z-index: 999;
        }
        .custom-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; }
        .custom-table th {

            border-bottom: 1px solid rgba(0, 240, 255, 0.15);

        .industry-card {
            background: linear-gradient(145deg, rgba(13, 19, 32, 0.9), rgba(8, 12, 22, 0.95));
            border: 1px solid rgba(0, 240, 255, 0.15);

            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);

        .industry-card::before {

</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
// MetaPlatform 演示版 - 纯 JS 实现，无需构建工具
// React 18 + Tailwind CSS via CDN

const { useState, useEffect, useRef } = React;
const h = React.createElement;

// Intersection Observer Hook
const useInView = () => {
  const ref = useRef(null);
  const [isInView, setIsInView] = useState(false);
  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setIsInView(true);
        observer.disconnect();
      }
    }, { threshold: 0.15 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);
  return [ref, isInView];
};

// Icon component (using emojis to avoid Lucide dependency)
const Icon = ({ name, size = 24, className = "" }) => {
  const icons = {
    brain: "🧠", network: "🌐", bot: "🤖", code: "💻", layers: "📚",
    shield: "🛡️", database: "💾", zap: "⚡", sparkles: "✨",
    trending: "📈", check: "✓", arrow: "→", chevron: "⌄",
    landmark: "🏛️", building: "🏢", factory: "🏭", heart: "💗",
    cart: "🛒", chart: "📊", target: "🎯", rocket: "🚀",
    crown: "👑", gem: "💎", trophy: "🏆", briefcase: "💼",
    users: "👥", user: "👤", briefcase_alt: "💼", money: "💰",
    tools: "🔧", package: "📦", cpu: "⚙️", megaphone: "📢",
    palette: "🎨", pencil: "✏️", beaker: "🧪"
  };
  return h('span', { className, style: { fontSize: `${size}px`, lineHeight: 1 } }, icons[name] || '◆');
};

// Sections config
const sections = [
  { id: 'cover', title: '封面' },
  { id: 'overview', title: '项目概览' },
  { id: 'market', title: '市场机会' },
  { id: 'competition', title: '竞争格局' },
  { id: 'product', title: '产品定位' },
  { id: 'industry', title: '行业解决方案' },
  { id: 'business', title: '商业模式' },
  { id: 'roadmap', title: '发展规划' },
  { id: 'funding', title: '融资规划' },
  { id: 'closing', title: '结语' }
];

// Section Title Component
const SectionTitle = ({ number, title, subtitle }) => {

  return h('div', { ref, className: `mb-16 transition-all duration-700 ${isInView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}` },

      h('span', { className: 'font-display text-5xl font-bold text-cyan-400/30' }, number),
      h('div', { className: 'h-px flex-1 bg-gradient-to-r from-cyan-400/50 to-transparent' })

    h('h2', { className: 'font-display text-4xl md:text-5xl font-bold mb-4 gradient-text' }, title),
    subtitle && h('p', { className: 'text-xl text-slate-400 max-w-3xl' }, subtitle)
  );
};

// Cover Section

    h('div', { className: 'gradient-orb w-80 h-80 bg-purple-600 bottom-0 left-1/4' }),
    h('div', { className: 'grid-pattern' }),
    h('div', { className: 'section-content text-center relative z-10' },
      h('div', { className: `transition-all duration-1000 ${isInView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}` },
        h('div', { className: 'inline-flex items-center gap-2 px-4 py-2 rounded-full border border-cyan-400/30 bg-cyan-400/5 mb-8' },
          h('span', { className: 'w-2 h-2 rounded-full bg-cyan-400 animate-pulse' }),
          h('span', { className: 'text-sm text-cyan-300 tracking-wider' }, '商业计划书 · 演示版')
        ),
        h('h1', { className: 'font-display text-6xl md:text-8xl font-bold mb-6 leading-tight' },
          h('span', { className: 'block text-white' }, 'MetaPlatform'),
          h('span', { className: 'block text-3xl md:text-5xl mt-4 text-slate-400 font-medium' }, '基于本体论引擎的企业级 AI 中台')
        ),
        h('p', { className: 'text-xl md:text-2xl text-slate-400 max-w-4xl mx-auto mb-12 leading-relaxed' },
          '融合知识图谱、低代码开发与 AI 原生能力，构建下一代企业智能基础设施'
        ),
        h('div', { className: 'flex flex-wrap justify-center gap-6 mb-16' },
          stats.map((s, i) => h('div', { key: i, className: 'glass-card px-8 py-5 min-w-[140px]' },
            h('div', { className: 'stat-number gradient-text' }, s.value),
            h('div', { className: 'text-sm text-slate-400 mt-2' }, s.label)
          ))
        ),
        h('button', {
          onClick: () => document.getElementById('overview').scrollIntoView({ behavior: 'smooth' }),
          className: 'group inline-flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-full text-white font-semibold hover:shadow-[0_0_40px_rgba(0,240,255,0.4)] transition-all'
        },
          '开始演示 ',
          h('span', { className: 'inline-block transition-transform group-hover:translate-y-1' }, '↓')
        )
      )
    ),
    h('div', { className: 'absolute bottom-8 left-1/2 -translate-x-1/2 text-slate-500 text-sm' }, '2026-07-09 · v1.0')
  );
};

// Overview Section
const OverviewSection = () => {
  const [ref, isInView] = useInView();
  const highlights = [
    { icon: 'brain', title: '本体引擎驱动', desc: 'EntityType/RelationType/实例 + 推理引擎 + 版本管理，为元数据注入语义能力' },
    { icon: 'network', title: '知识图谱增强', desc: 'Neo4j 5 属性图 + GraphRAG 融合，复杂推理成本从 $33,000 降至 $33' },
    { icon: 'bot', title: 'AI 原生中台', desc: 'AI Substrate 渗透九层架构，数字员工引擎 + 多智能体协作' },
    { icon: 'code', title: '低代码生成', desc: 'Schema 驱动页面/表单/流程自动生成，VibeCoding 自然语言开发' }

  const markets = [

  return h('section', { id: 'overview', className: 'section bg-[#080c14]' },
    h('div', { className: 'gradient-orb w-[500px] h-[500px] bg-blue-600/30 -right-40 top-1/4' }),
    h('div', { className: 'grid-pattern opacity-50' }),
    h('div', { className: 'section-content' },
      h(SectionTitle, { number: '01', title: '项目概览', subtitle: '以开源技术栈实现 Palantir 级本体驱动架构，适配中国企业信创与预算约束' }),
      h('div', { ref, className: `grid md:grid-cols-2 gap-8 transition-all duration-700 ${isInView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}` },
        h('div', { className: 'space-y-6' },
          h('div', { className: 'glass-card p-8' },

            h('p', { className: 'text-slate-300 leading-relaxed text-lg' },

            )

          h('div', { className: 'grid grid-cols-2 gap-4' },
            highlights.map((item, i) => h('div', { key: i, className: 'glass-card p-5 hover:border-cyan-400/40' },
              h('div', { className: 'text-cyan-400 mb-3' }, h(Icon, { name: item.icon, size: 28 })),

              h('p', { className: 'text-sm text-slate-400 leading-relaxed' }, item.desc)
            ))
          )
        ),
        h('div', { className: 'glass-card p-8 relative overflow-hidden' },
          h('div', { className: 'absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl' }),
          h('h3', { className: 'font-display text-2xl font-bold mb-6 text-white' }, '市场机会窗口'),
          h('div', { className: 'space-y-5' },

// Market Section

            h('div', { className: 'text-sm text-slate-400 mb-3' }, item.level),

            h('div', { className: 'space-y-4' },

          h('div', { className: 'glass-card p-8' },
            h('h3', { className: 'font-display text-2xl font-bold mb-6 text-white' }, '中国市场增长预测'),
            h('div', { className: 'space-y-4' },
              [

                h('div', { className: 'w-20 text-cyan-400 font-bold font-display' }, item.year),

// Main App
const App = () => {
  const [activeSection, setActiveSection] = useState('cover');
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const handleScroll = () => {
      const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
      const currentProgress = (window.scrollY / totalHeight) * 100;
      setProgress(currentProgress);

      sections.forEach(section => {
        const element = document.getElementById(section.id);
        if (element) {
          const rect = element.getBoundingClientRect();
          if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
            setActiveSection(section.id);
          }
        }
      });
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  return h('div', { className: 'relative' },
    h('div', { className: 'progress-bar', style: { width: `${progress}%` } }),
    h('div', { className: 'scanline' }),
    h(Navigation, { activeSection }),
    h(CoverSection),
    h(OverviewSection),
    h(MarketSection),
    h(CompetitionSection),
    h(ProductSection),
    h(IndustrySection),
    h(BusinessSection),
    h(RoadmapSection),
    h(FundingSection),
    h(ClosingSection),
    h('footer', { className: 'py-8 text-center text-slate-600 text-sm border-t border-slate-800/50' },
      '© 2026 MetaPlatform. 商业计划书 · 演示版'
    )
  );
};
