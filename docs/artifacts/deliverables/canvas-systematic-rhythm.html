<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: 'Jura'; src: url('file:///C:/Users/houuu/.trae-cn/skills/canvas-design/canvas-fonts/Jura-Light.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Jura'; src: url('file:///C:/Users/houuu/.trae-cn/skills/canvas-design/canvas-fonts/Jura-Medium.ttf') format('truetype'); font-weight: 500; }
@font-face { font-family: 'GeistMono'; src: url('file:///C:/Users/houuu/.trae-cn/skills/canvas-design/canvas-fonts/GeistMono-Regular.ttf') format('truetype'); }
@font-face { font-family: 'Outfit'; src: url('file:///C:/Users/houuu/.trae-cn/skills/canvas-design/canvas-fonts/Outfit-Regular.ttf') format('truetype'); }
@font-face { font-family: 'Outfit'; src: url('file:///C:/Users/houuu/.trae-cn/skills/canvas-design/canvas-fonts/Outfit-Bold.ttf') format('truetype'); font-weight: 700; }
@font-face { font-family: 'IBMPlexMono'; src: url('file:///C:/Users/houuu/.trae-cn/skills/canvas-design/canvas-fonts/IBMPlexMono-Regular.ttf') format('truetype'); }

* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1600px; height: 1200px; overflow: hidden; background: #faf9f7; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1600" height="1200"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const C = {
  bg: '#faf9f7',
  bgAlt: '#f3f1ee',
  border: '#e2e0dc',
  borderLight: '#eceae6',
  text: '#2c2a26',
  textLight: '#8a8780',
  textMuted: '#b5b2ab',
  start: '#22c55e',
  startBg: '#f0fdf4',
  end: '#ef4444',
  endBg: '#fef2f2',
  node: '#f8f7f5',
  nodeBorder: '#d6d4d0',
  nodeIcon: '#94a3b8',
  diamond: '#f0efed',
  diamondBorder: '#d6d4d0',
  container: '#fcfbfa',
  containerBorder: '#d1cfcb',
  line: '#c8c5bf',
  lineLight: '#e2e0dc',
};

const F = {
  title: '300 38px Jura, sans-serif',
  subtitle: '300 14px Jura, sans-serif',
  label: '12px Outfit, sans-serif',
  labelBold: '700 12px Outfit, sans-serif',
  mono: '11px GeistMono, monospace',
  ref: '9px IBMPlexMono, monospace',
  small: '10px Outfit, sans-serif',
};

function drawRoundedRect(x, y, w, h, r, fill, stroke, lineWidth = 1) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
}

function drawCircle(cx, cy, r, fill, stroke, lineWidth = 1.5) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
}

function drawDiamond(cx, cy, size, fill, stroke, lineWidth = 1.5) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.PI / 4);
  const half = size / 2;
  ctx.beginPath();
  ctx.roundRect(-half, -half, size, size, 4);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lineWidth; ctx.stroke(); }
  ctx.restore();
}

function drawLine(x1, y1, x2, y2, color = C.line, width = 1) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.stroke();
}

function drawBezier(x1, y1, x2, y2, color = C.line, width = 1) {
  const cx1 = x1 + (x2 - x1) * 0.5;
  const cx2 = x2 - (x2 - x1) * 0.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.bezierCurveTo(cx1, y1, cx2, y2, x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.stroke();
}

function drawArrowHead(x, y, angle, size = 6, color = C.line) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-size, -size / 2);
  ctx.lineTo(-size, size / 2);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawRefMarker(x, y, num) {
  ctx.font = F.ref;
  ctx.fillStyle = C.textMuted;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText(num.toString(), x, y);
}

// BACKGROUND
ctx.fillStyle = C.bg;
ctx.fillRect(0, 0, 1600, 1200);

// Subtle grid dots
ctx.fillStyle = C.borderLight;
for (let x = 40; x < 1600; x += 30) {
  for (let y = 40; y < 1200; y += 30) {
    ctx.beginPath();
    ctx.arc(x, y, 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// TITLE
ctx.font = F.title;
ctx.fillStyle = C.text;
ctx.textAlign = 'left';
ctx.textBaseline = 'top';
ctx.fillText('SYSTEMATIC RHYTHM', 80, 60);

ctx.font = F.subtitle;
ctx.fillStyle = C.textLight;
ctx.fillText('A Taxonomy of Process  ·  Plate I', 80, 108);

drawLine(80, 140, 1520, 140, C.border, 0.5);

// REFERENCE MARKERS
ctx.font = F.ref;
ctx.fillStyle = C.textMuted;
ctx.textAlign = 'right';
ctx.fillText('ref. 001-018', 1520, 68);
ctx.fillText('Systematic Rhythm Collection', 1520, 82);

// MAIN FLOW
const Y_MAIN = 520;
const Y_UPPER = 420;
const Y_LOWER = 620;

// Subprocess Container
ctx.setLineDash([6, 4]);
ctx.strokeStyle = C.containerBorder;
ctx.lineWidth = 1;
ctx.beginPath();
ctx.roundRect(580, 360, 400, 300, 8);
ctx.stroke();
ctx.setLineDash([]);

ctx.font = F.small;
ctx.fillStyle = C.textMuted;
ctx.textAlign = 'left';
ctx.fillText('Subprocess', 596, 378);
drawRefMarker(670, 378, '1');

// Group Container
ctx.setLineDash([4, 3]);
ctx.strokeStyle = C.borderLight;
ctx.lineWidth = 0.8;
ctx.beginPath();
ctx.roundRect(560, 340, 440, 340, 6);
ctx.stroke();
ctx.setLineDash([]);
ctx.font = F.ref;
ctx.fillStyle = C.textMuted;
ctx.textAlign = 'left';
ctx.fillText('group a', 572, 354);

// START NODE
const startX = 200, startY = Y_MAIN;
drawCircle(startX, startY, 22, C.startBg, C.start, 2);
ctx.beginPath();
ctx.moveTo(startX - 5, startY - 8);
ctx.lineTo(startX - 5, startY + 8);
ctx.lineTo(startX + 9, startY);
ctx.closePath();
ctx.fillStyle = C.start;
ctx.fill();
ctx.font = F.label;
ctx.fillStyle = C.text;
ctx.textAlign = 'center';
ctx.fillText('Start', startX, startY + 38);
drawRefMarker(startX + 28, startY - 18, '2');

// USER TASK
const utX = 400, utY = Y_MAIN - 26;
drawRoundedRect(utX, utY, 140, 52, 8, C.node, C.nodeBorder, 1.2);
drawCircle(utX + 22, utY + 26, 12, C.bgAlt, C.nodeBorder, 0.8);
ctx.beginPath();
ctx.arc(utX + 22, utY + 20, 4, 0, Math.PI * 2);
ctx.fillStyle = C.nodeIcon;
ctx.fill();
ctx.beginPath();
ctx.arc(utX + 22, utY + 32, 7, Math.PI, 0);
ctx.fillStyle = C.nodeIcon;
ctx.fill();
ctx.font = F.label;
ctx.fillStyle = C.text;
ctx.textAlign = 'left';
ctx.fillText('User Task', utX + 40, utY + 30);
drawRefMarker(utX + 146, utY + 2, '3');

// EXCLUSIVE GATEWAY
const gw1X = 640, gw1Y = Y_MAIN;
drawDiamond(gw1X, gw1Y, 44, C.diamond, C.diamondBorder, 1.2);
ctx.strokeStyle = C.nodeIcon;
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(gw1X - 8, gw1Y - 8);
ctx.lineTo(gw1X + 8, gw1Y + 8);
ctx.moveTo(gw1X + 8, gw1Y - 8);
ctx.lineTo(gw1X - 8, gw1Y + 8);
ctx.stroke();
ctx.font = F.small;
ctx.fillStyle = C.text;
ctx.textAlign = 'center';
ctx.fillText('XOR', gw1X, gw1Y + 38);
drawRefMarker(gw1X + 28, gw1Y - 22, '4');

// SERVICE TASK
const stX = 700, stY = Y_UPPER - 26;
drawRoundedRect(stX, stY, 140, 52, 8, C.node, C.nodeBorder, 1.2);
drawCircle(stX + 22, stY + 26, 12, C.bgAlt, C.nodeBorder, 0.8);
ctx.beginPath();
ctx.arc(stX + 22, stY + 26, 5, 0, Math.PI * 2);
ctx.strokeStyle = C.nodeIcon;
ctx.lineWidth = 1.5;
ctx.stroke();
ctx.beginPath();
ctx.arc(stX + 22, stY + 26, 2, 0, Math.PI * 2);
ctx.fillStyle = C.nodeIcon;
ctx.fill();
ctx.font = F.label;
ctx.fillStyle = C.text;
ctx.textAlign = 'left';
ctx.fillText('Service Task', stX + 40, stY + 30);
drawRefMarker(stX + 146, stY + 2, '5');

// SCRIPT TASK
const scX = 700, scY = Y_LOWER - 26;
drawRoundedRect(scX, scY, 140, 52, 8, C.node, C.nodeBorder, 1.2);
drawCircle(scX + 22, scY + 26, 12, C.bgAlt, C.nodeBorder, 0.8);
ctx.font = '10px GeistMono, monospace';
ctx.fillStyle = C.nodeIcon;
ctx.textAlign = 'center';
ctx.fillText('</>', scX + 22, scY + 30);
ctx.font = F.label;
ctx.fillStyle = C.text;
ctx.textAlign = 'left';
ctx.fillText('Script Task', scX + 40, scY + 30);
drawRefMarker(scX + 146, scY + 2, '6');

// PARALLEL GATEWAY
const gw2X = 1040, gw2Y = Y_MAIN;
drawDiamond(gw2X, gw2Y, 44, C.diamond, C.diamondBorder, 1.2);
ctx.strokeStyle = C.nodeIcon;
ctx.lineWidth = 1.5;
ctx.beginPath();
ctx.moveTo(gw2X - 8, gw2Y);
ctx.lineTo(gw2X + 8, gw2Y);
ctx.moveTo(gw2X, gw2Y - 8);
ctx.lineTo(gw2X, gw2Y + 8);
ctx.stroke();
ctx.font = F.small;
ctx.fillStyle = C.text;
ctx.textAlign = 'center';
ctx.fillText('AND', gw2X, gw2Y + 38);
drawRefMarker(gw2X + 28, gw2Y - 22, '7');

// APPROVAL TASK
const ut2X = 1200, ut2Y = Y_MAIN - 26;
drawRoundedRect(ut2X, ut2Y, 140, 52, 8, C.node, C.nodeBorder, 1.2);
drawCircle(ut2X + 22, ut2Y + 26, 12, C.bgAlt, C.nodeBorder, 0.8);
ctx.beginPath();
ctx.arc(ut2X + 22, ut2Y + 20, 4, 0, Math.PI * 2);
ctx.fillStyle = C.nodeIcon;
ctx.fill();
ctx.beginPath();
ctx.arc(ut2X + 22, ut2Y + 32, 7, Math.PI, 0);
ctx.fillStyle = C.nodeIcon;
ctx.fill();
ctx.font = F.label;
ctx.fillStyle = C.text;
ctx.textAlign = 'left';
ctx.fillText('Approval', ut2X + 40, ut2Y + 30);
drawRefMarker(ut2X + 146, ut2Y + 2, '8');

// END NODE
const endX = 1440, endY = Y_MAIN;
drawCircle(endX, endY, 22, C.endBg, C.end, 2.5);
ctx.beginPath();
ctx.arc(endX, endY, 8, 0, Math.PI * 2);
ctx.fillStyle = C.end;
ctx.fill();
drawRefMarker(endX + 28, endY - 18, '9');

// TEXT ANNOTATION
const taX = 1200, taY = 700;
ctx.beginPath();
ctx.moveTo(taX, taY);
ctx.lineTo(taX, taY + 44);
ctx.strokeStyle = C.nodeIcon;
ctx.lineWidth = 2;
ctx.stroke();
ctx.font = F.small;
ctx.fillStyle = C.textLight;
ctx.textAlign = 'left';
ctx.fillText('Annotation', taX + 10, taY + 18);
ctx.font = F.ref;
ctx.fillStyle = C.textMuted;
ctx.fillText('Post-merge validation', taX + 10, taY + 34);
drawRefMarker(taX + 166, taY + 2, '10');

// CONNECTING LINES
drawBezier(startX + 22, startY, utX, startY, C.line, 1);
drawArrowHead(utX, startY, 0, 5, C.line);

drawBezier(utX + 140, startY, gw1X - 22, startY, C.line, 1);
drawArrowHead(gw1X - 22, startY, 0, 5, C.line);

drawBezier(gw1X, gw1Y - 22, gw1X, Y_UPPER, C.lineLight, 0.8);
drawBezier(gw1X, Y_UPPER, stX, Y_UPPER, C.lineLight, 0.8);
drawArrowHead(stX, Y_UPPER, 0, 5, C.lineLight);

drawBezier(gw1X, gw1Y + 22, gw1X, Y_LOWER, C.lineLight, 0.8);
drawBezier(gw1X, Y_LOWER, scX, Y_LOWER, C.lineLight, 0.8);
drawArrowHead(scX, Y_LOWER, 0, 5, C.lineLight);

drawBezier(stX + 140, Y_UPPER, gw2X, Y_UPPER, C.lineLight, 0.8);
drawBezier(gw2X, Y_UPPER, gw2X, gw2Y - 22, C.lineLight, 0.8);
drawArrowHead(gw2X, gw2Y - 22, Math.PI / 2, 5, C.lineLight);

drawBezier(scX + 140, Y_LOWER, gw2X, Y_LOWER, C.lineLight, 0.8);
drawBezier(gw2X, Y_LOWER, gw2X, gw2Y + 22, C.lineLight, 0.8);
drawArrowHead(gw2X, gw2Y + 22, -Math.PI / 2, 5, C.lineLight);

drawBezier(gw2X + 22, gw2Y, ut2X, gw2Y, C.line, 1);
drawArrowHead(ut2X, gw2Y, 0, 5, C.line);

drawBezier(ut2X + 140, startY, endX - 22, startY, C.line, 1);
drawArrowHead(endX - 22, startY, 0, 5, C.line);

// BOTTOM REFERENCE
drawLine(80, 820, 1520, 820, C.border, 0.5);

ctx.font = F.ref;
ctx.fillStyle = C.textMuted;
ctx.textAlign = 'left';
ctx.fillText('LEGEND', 80, 844);

const legendY = 868;
drawCircle(100, legendY, 8, C.startBg, C.start, 1.2);
ctx.font = F.ref;
ctx.fillStyle = C.textLight;
ctx.textAlign = 'left';
ctx.fillText('Initiation', 116, legendY + 3);

drawCircle(220, legendY, 8, C.endBg, C.end, 1.2);
ctx.fillText('Termination', 236, legendY + 3);

drawRoundedRect(360, legendY - 8, 20, 16, 3, C.node, C.nodeBorder, 0.8);
ctx.fillText('Task', 388, legendY + 3);

drawDiamond(480, legendY, 16, C.diamond, C.diamondBorder, 0.8);
ctx.fillText('Gateway', 496, legendY + 3);

ctx.setLineDash([3, 2]);
ctx.strokeStyle = C.containerBorder;
ctx.lineWidth = 0.8;
ctx.beginPath();
ctx.roundRect(590, legendY - 8, 20, 16, 2);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillText('Container', 618, legendY + 3);

ctx.font = F.ref;
ctx.fillStyle = C.textMuted;
ctx.textAlign = 'right';
ctx.fillText('Systematic Rhythm  ·  2026  ·  MetaPlatform', 1520, 844);
ctx.fillText('Process topology mapped with clinical precision', 1520, 860);

// SYSTEMATIC MARKERS
const markers = [
  { x: 80, y: 200, label: 'a' },
  { x: 1520, y: 200, label: 'w' },
  { x: 80, y: 780, label: 'I' },
  { x: 1520, y: 780, label: 'XVIII' },
];
markers.forEach(m => {
  ctx.font = F.ref;
  ctx.fillStyle = C.textMuted;
  ctx.textAlign = m.x < 800 ? 'left' : 'right';
  ctx.fillText(m.label, m.x, m.y);
});

// BORDER FRAME
ctx.strokeStyle = C.border;
ctx.lineWidth = 0.5;
ctx.strokeRect(40, 40, 1520, 1120);

ctx.strokeStyle = C.borderLight;
ctx.lineWidth = 0.3;
ctx.strokeRect(50, 50, 1500, 1100);
</script>
</body>
</html>
