server:
  port: 8085

spring:
  application:
    name: dialogue-layer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Dialogue Layer configuration
dialogue:
  context:
    max-history-messages: 50
    session-timeout-minutes: 30
  parser:
    # Confidence threshold for intent detection
    confidence-threshold: 0.6
  response:
    default-language: zh-CN
    max-response-length: 2000

logging:
  level:
    com.metaplatform.dialogue: DEBUG
