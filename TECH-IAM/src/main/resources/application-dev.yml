spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/metaplatform_iam
    username: ${DB_USERNAME:meta}
    password: ${DB_PASSWORD:meta}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:meta}
      database: 0
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    properties:
      delivery.timeout.ms: 10000

app:
  jwt:
    secret: ${JWT_SECRET:mate-platform-default-secret-key-must-be-over-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:7200000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
