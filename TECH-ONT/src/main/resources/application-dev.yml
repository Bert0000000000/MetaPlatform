spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/metaplatform_ont
    username: ${DB_USERNAME:meta}
    password: ${DB_PASSWORD:meta}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:meta}
      database: 0
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:metaplatform}

app:
  jwt:
    secret: ${JWT_SECRET:mate-platform-default-secret-key-must-be-over-32-bytes}

mate:
  llmgw:
    base-url: http://localhost:8210
    default-model: qwen-max
    timeout-seconds: 30
