apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: metaplatform-dev

namePrefix: dev-

resources:
  - ../../base

# In dev we want fewer replicas and smaller resources
patches:
  - target:
      kind: Deployment
      name: metaplatform-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi

  - target:
      kind: HorizontalPodAutoscaler
      name: metaplatform-api
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

# Use dev ingress host
patches:
  - target:
      kind: Ingress
      name: metaplatform
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.metaplatform.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.metaplatform.example.com

commonLabels:
  env: dev