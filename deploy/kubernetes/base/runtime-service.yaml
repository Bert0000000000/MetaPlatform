# ──────────────────────────────────────────────────────────
# Runtime Service — ClusterIP ONLY
# ──────────────────────────────────────────────────────────
# The runtime is reachable exclusively from inside the cluster
# (via NetworkPolicy + ClusterIP). External traffic MUST come
# through the platform's reverse-proxy / Ingress, which performs
# authentication, rate limiting and path routing.
# ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: metaplatform-runtime
  namespace: metaplatform
  labels:
    app: metaplatform-runtime
    tier: runtime
spec:
  type: ClusterIP
  clusterIP: None   # headless — orchestrator stamps one Service per app
  selector:
    app: metaplatform-runtime
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
      appProtocol: http
  publishNotReadyAddresses: false
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv4]
