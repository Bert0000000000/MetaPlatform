# Horizontal Pod Autoscaler for the API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: metaplatform-api
  namespace: metaplatform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: metaplatform-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
---
# Pod Disruption Budget to ensure availability during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: metaplatform-api
  namespace: metaplatform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: metaplatform-api