# Secret for MetaPlatform Runtime (one token per app_slug cluster)
#
# In real clusters use sealed-secrets / external-secrets / vault and
# generate a unique token per app_slug namespace. DO NOT commit a
# real value here.
apiVersion: v1
kind: Secret
metadata:
  name: metaplatform-runtime-admin
  namespace: metaplatform
  labels:
    app: metaplatform-runtime
type: Opaque
stringData:
  # 32-byte random token, e.g.:
  #   openssl rand -hex 32
  token: "CHANGE_ME_runtime_admin_token_use_sealed_secrets"
