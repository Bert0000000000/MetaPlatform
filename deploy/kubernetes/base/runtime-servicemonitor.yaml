# ──────────────────────────────────────────────────────────
# ServiceMonitor — Prometheus scrape for runtime metrics
# ──────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: metaplatform-runtime
  namespace: metaplatform
  labels:
    app: metaplatform-runtime
    release: prometheus
spec:
  selector:
    matchLabels:
      app: metaplatform-runtime
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 5s
      honorLabels: true
