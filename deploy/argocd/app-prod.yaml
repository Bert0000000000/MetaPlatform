# ArgoCD Application for MetaPlatform — prod overlay
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metaplatform-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: metaplatform
    env: prod
spec:
  project: default
  source:
    repoURL: https://github.com/Bert0000000000/MetaPlatform.git
    targetRevision: main
    path: deploy/kubernetes/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: metaplatform-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 20
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
---
# AppProject — restrict dev/prod to specific clusters and namespaces
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: metaplatform
  namespace: argocd
spec:
  description: MetaPlatform GitOps project
  sourceRepos:
    - https://github.com/Bert0000000000/MetaPlatform.git
  destinations:
    - namespace: metaplatform-dev
      server: https://kubernetes.default.svc
    - namespace: metaplatform-prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
    - group: networking.k8s.io
      kind: Ingress
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
  orphanedResources:
    warn: true
  roles:
    - name: developer
      description: Read-only access to dev
      policies:
        - p, proj:metaplatform:developer, applications, get, metaplatform/*, allow
      groups:
        - developers