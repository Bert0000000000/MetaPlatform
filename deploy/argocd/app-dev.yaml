# ArgoCD Application for MetaPlatform — dev overlay
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metaplatform-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: metaplatform
    env: dev
spec:
  project: default
  source:
    repoURL: https://github.com/Bert0000000000/MetaPlatform.git
    targetRevision: main
    path: deploy/kubernetes/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: metaplatform-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas