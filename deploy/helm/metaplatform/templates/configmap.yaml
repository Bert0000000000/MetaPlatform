apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "metaplatform.fullname" . }}-config
  labels:
    {{- include "metaplatform.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.NODE_ENV | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}
  CDC_ENABLED: {{ .Values.config.CDC_ENABLED | quote }}
  CDC_TABLES: {{ .Values.config.CDC_TABLES | quote }}
  CDC_POLL_INTERVAL_MS: {{ .Values.config.CDC_POLL_INTERVAL_MS | quote }}
  CDC_TOPIC_PREFIX: {{ .Values.config.CDC_TOPIC_PREFIX | quote }}
  EMBEDDING_MODEL: {{ .Values.config.EMBEDDING_MODEL | quote }}
  EMBEDDING_DIM: {{ .Values.config.EMBEDDING_DIM | quote }}
  LLM_PROVIDER: {{ .Values.config.LLM_PROVIDER | quote }}
  LLM_MODEL: {{ .Values.config.LLM_MODEL | quote }}
  LLM_BASE_URL: {{ .Values.config.LLM_BASE_URL | quote }}
  OCR_LANGS: {{ .Values.config.OCR_LANGS | quote }}
  RAG_TOPK: {{ .Values.config.RAG_TOPK | quote }}
  RAG_COLLECTION: {{ .Values.config.RAG_COLLECTION | quote }}
  {{- if .Values.backends.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s:%d" .Values.backends.redis.host .Values.backends.redis.port | quote }}
  {{- end }}
  {{- if .Values.backends.neo4j.enabled }}
  NEO4J_URL: {{ printf "bolt://%s:%d" .Values.backends.neo4j.host .Values.backends.neo4j.port | quote }}
  {{- end }}
  {{- if .Values.backends.elasticsearch.enabled }}
  ELASTICSEARCH_URL: {{ printf "http://%s:%d" .Values.backends.elasticsearch.host .Values.backends.elasticsearch.port | quote }}
  ELASTICSEARCH_INDEX: "metaplatform"
  {{- end }}
  {{- if .Values.backends.minio.enabled }}
  MINIO_ENDPOINT: {{ .Values.backends.minio.host | quote }}
  MINIO_PORT: {{ .Values.backends.minio.port | quote }}
  MINIO_BUCKET: {{ .Values.backends.minio.bucket | quote }}
  {{- end }}
  {{- if .Values.backends.kafka.enabled }}
  KAFKA_BROKERS: {{ printf "%s:%d" .Values.backends.kafka.host .Values.backends.kafka.port | quote }}
  {{- end }}
  {{- if .Values.backends.clickhouse.enabled }}
  CLICKHOUSE_URL: {{ printf "http://%s:%d" .Values.backends.clickhouse.host .Values.backends.clickhouse.port | quote }}
  CLICKHOUSE_DATABASE: "metaplatform"
  {{- end }}