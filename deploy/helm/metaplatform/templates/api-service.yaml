apiVersion: v1
kind: Service
metadata:
  name: {{ include "metaplatform.fullname" . }}-api
  labels:
    {{- include "metaplatform.labels" . | nindent 4 }}
    app: metaplatform-api
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "metaplatform.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3001
      protocol: TCP