# Default values for MetaPlatform Helm chart.
# Override via `helm install -f my-values.yaml` or `--set key=value`.

# Number of API replicas
replicaCount: 3

image:
  repository: metaplatform/api
  pullPolicy: IfNotPresent
  tag: "1.5.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3001"
  prometheus.io/path: "/api/observability/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: app.metaplatform.example.com
      paths:
        - path: /api
          pathType: Prefix
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - app.metaplatform.example.com
      secretName: metaplatform-tls

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1.5Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 2

probes:
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

# Application config (env vars)
config:
  NODE_ENV: production
  LOG_LEVEL: info
  CDC_ENABLED: "true"
  CDC_TABLES: "ontology_objects,knowledge_documents,process_instances,messages,todos"
  CDC_POLL_INTERVAL_MS: "5000"
  CDC_TOPIC_PREFIX: "metaplatform.cdc"
  EMBEDDING_MODEL: "text-embedding-3-small"
  EMBEDDING_DIM: "1536"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4o-mini"
  LLM_BASE_URL: "https://api.openai.com/v1"
  OCR_LANGS: "eng+chi_sim"
  RAG_TOPK: "5"
  RAG_COLLECTION: "metaplatform_vectors"

# Backend service endpoints (in-cluster DNS names)
backends:
  postgres:
    enabled: false   # Bring your own PG (RDS / Cloud SQL / on-prem)
  redis:
    enabled: true
    host: metaplatform-redis
    port: 6379
  neo4j:
    enabled: true
    host: metaplatform-neo4j
    port: 7687
  elasticsearch:
    enabled: true
    host: metaplatform-elasticsearch
    port: 9200
  minio:
    enabled: true
    host: metaplatform-minio
    port: 9000
    bucket: metaplatform
  kafka:
    enabled: true
    host: metaplatform-kafka
    port: 9092
  clickhouse:
    enabled: true
    host: metaplatform-clickhouse
    port: 8123

# Existing-secret references — secret itself is not managed by this chart
existingSecret: metaplatform-api-secret

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  honorLabels: true
  labels:
    release: prometheus

# PrometheusRule (alerts)
prometheusRule:
  enabled: true
  groups:
    - name: metaplatform-api.rules
      interval: 30s
      rules:
        - alert: MetaPlatformAPIDown
          expr: up{job="metaplatform-api"} == 0
          for: 2m
          labels:
            severity: critical
        - alert: MetaPlatformBackendUnreachable
          expr: metaplatform_backend_up == 0
          for: 5m
          labels:
            severity: warning
        - alert: MetaPlatformHighErrorRate
          expr: |
            sum(rate(metaplatform_http_requests_total{status=~"5.."}[5m]))
              /
            sum(rate(metaplatform_http_requests_total[5m]))
              > 0.05
          for: 10m
          labels:
            severity: warning

# Frontend
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: nginx
    tag: "1.27-alpine"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }