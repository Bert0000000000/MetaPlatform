{{- if .Values.ontologyEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metaplatform.fullname" . }}-ontology-engine
  labels:
    {{- include "metaplatform.componentLabels" (dict "context" . "component" "ontology-engine") | nindent 4 }}
spec:
  replicas: {{ .Values.ontologyEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "metaplatform.name" . }}
      app.kubernetes.io/component: ontology-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "metaplatform.name" . }}
        app.kubernetes.io/component: ontology-engine
    spec:
      containers:
        - name: ontology-engine
          image: "{{ .Values.ontologyEngine.image.repository }}:{{ .Values.ontologyEngine.image.tag }}"
          imagePullPolicy: {{ .Values.ontologyEngine.image.pullPolicy }}
          ports:
            - containerPort: 8090
              protocol: TCP
          env:
            {{- range $key, $value := .Values.ontologyEngine.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: AI_LLM_BASE_URL
              value: {{ .Values.ai.llm.baseUrl | quote }}
            - name: AI_LLM_API_KEY
              value: {{ .Values.ai.llm.apiKey | quote }}
            - name: AI_LLM_MODEL
              value: {{ .Values.ai.llm.model | quote }}
          {{- with .Values.ontologyEngine.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ontologyEngine.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.ontologyEngine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "metaplatform.fullname" . }}-ontology-engine
  labels:
    {{- include "metaplatform.componentLabels" (dict "context" . "component" "ontology-engine") | nindent 4 }}
spec:
  type: {{ .Values.ontologyEngine.service.type }}
  ports:
    - port: {{ .Values.ontologyEngine.service.port }}
      targetPort: 8090
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "metaplatform.name" . }}
    app.kubernetes.io/component: ontology-engine
{{- end }}
