global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ontology-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ontology-engine:8090']

  - job_name: 'page-generator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['page-generator:8083']
