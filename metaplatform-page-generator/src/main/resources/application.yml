server:
  port: 8083

spring:
  application:
    name: metaplatform-page-generator
  datasource:
    url: jdbc:h2:mem:pagedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Cross-module service endpoints
services:
  ontology-engine:
    base-url: http://localhost:8081
  ai-substrate:
    base-url: http://localhost:8082
