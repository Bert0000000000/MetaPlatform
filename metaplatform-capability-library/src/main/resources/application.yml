server:
  port: 8086

spring:
  application:
    name: capability-library

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Capability Library configuration
capability:
  registry:
    auto-register-builtin: true
  pipeline:
    max-steps: 20
    default-timeout-ms: 30000

logging:
  level:
    com.metaplatform.capability: DEBUG
