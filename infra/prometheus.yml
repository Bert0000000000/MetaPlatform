# ════════════════════════════════════════════════════════════
# MetaPlatform Prometheus 配置
# 抓取各服务 /actuator/prometheus 端点
# ════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: tech-iam
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['tech-iam:8101']

  - job_name: tech-ont
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['tech-ont:8201']

  - job_name: tech-rule
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['tech-rule:8501']

  - job_name: tech-msg
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['tech-msg:8601']

  - job_name: tech-gw
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['tech-gw:8000']

  - job_name: tech-wfe
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['tech-wfe:8801']
