spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/metaplatform_action
    username: ${DB_USERNAME:meta}
    password: ${DB_PASSWORD:meta}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

action:
  integration:
    ont:
      base-url: ${TECH_ONT_BASE_URL:http://localhost:8201}
    rule:
      base-url: ${TECH_RULE_BASE_URL:http://localhost:8501}
  outbox:
    relay-fixed-rate-ms: 5000
    relay-topic: ${ACTION_EVENTS_TOPIC:metaplatform-action-events}
