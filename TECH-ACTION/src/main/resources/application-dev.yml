spring:
  datasource:
    url: jdbc:h2:mem:metaplatform_action;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

action:
  integration:
    ont:
      base-url: ${TECH_ONT_BASE_URL:http://localhost:8201}
    rule:
      base-url: ${TECH_RULE_BASE_URL:http://localhost:8501}
  outbox:
    relay-fixed-rate-ms: 5000
    relay-topic: ${ACTION_EVENTS_TOPIC:metaplatform-action-events}
