spring:
  datasource:
    url: jdbc:h2:mem:test_action;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

action:
  integration:
    ont:
      base-url: http://localhost:8201
    rule:
      base-url: http://localhost:8501
  outbox:
    relay-fixed-rate-ms: 5000
    relay-topic: metaplatform-action-events
