name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  java-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - TECH-IAM
          - TECH-GW
          - TECH-OBS
          - TECH-EA
          - TECH-ACTION
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Maven tests (${{ matrix.module }})
        working-directory: ./${{ matrix.module }}
        run: mvn -B test

  python-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - TECH-LLMGW
          - TECH-A2A
          - TECH-AGENT
          - TECH-RAG
          - TECH-DATA
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies and test (${{ matrix.module }})
        working-directory: ./${{ matrix.module }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install pytest httpx
          pytest

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - APP-DASHBOARD
          - APP-SUPERAI
          - APP-APPHUB
          - APP-DW
          - APP-ARCH
          - APP-ONTSTUDIO
          - APP-MCPHUB
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ./${{ matrix.module }}/package-lock.json
      - name: Install dependencies and lint (${{ matrix.module }})
        working-directory: ./${{ matrix.module }}
        run: |
          npm ci
          npm run lint
