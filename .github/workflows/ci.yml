name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CLICKHOUSE_URL: http://localhost:8123
  CLICKHOUSE_USER: meta
  CLICKHOUSE_PASSWORD: metaplatform2026

jobs:
  # ─── 1. Backend unit tests (vitest) — fast, no external deps ──
  backend-unit:
    name: Backend unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: metaplatform-api/package-lock.json
      - run: cd metaplatform-api && npm ci
      - run: cd metaplatform-api && npm test
      - run: cd metaplatform-api && npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: metaplatform-api/coverage/

  # ─── 2. Backend integration tests (Phase 1-5) ─────────────
  backend-integration:
    name: Backend integration tests (Phase 1-5)
    runs-on: ubuntu-latest
    needs: backend-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: metaplatform_test
          POSTGRES_USER: mp
          POSTGRES_PASSWORD: mp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/metaplatform2026
          NEO4J_PLUGINS: '[]'
        ports: ["7474:7474", "7687:7687"]
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports: ["9200:9200"]
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: metaplatform
          MINIO_ROOT_PASSWORD: metaplatform_secret_2026
        ports: ["9000:9000", "9001:9001"]
        options: server /data --console-address ":9001"
      kafka:
        image: bitnami/kafka:3.6
        env:
          KAFKA_CFG_NODE_ID: "1"
          KAFKA_CFG_PROCESS_ROLES: "controller,broker"
          KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
          ALLOW_PLAINTEXT_LISTENER: "yes"
        ports: ["9092:9092"]
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        env:
          CLICKHOUSE_DB: metaplatform
          CLICKHOUSE_USER: meta
          CLICKHOUSE_PASSWORD: metaplatform2026
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports: ["8123:8123", "9000:9000"]
    env:
      DATABASE_URL: postgres://mp:mp_test@localhost:5432/metaplatform_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      NEO4J_URL: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: metaplatform2026
      ELASTICSEARCH_URL: http://localhost:9200
      ELASTICSEARCH_INDEX: metaplatform
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: metaplatform
      MINIO_SECRET_KEY: metaplatform_secret_2026
      MINIO_BUCKET: metaplatform
      KAFKA_BROKERS: localhost:9092
      KAFKA_CLIENT_ID: metaplatform-api-test
      KAFKA_GROUP_ID: metaplatform-api-test
      CDC_ENABLED: "false"
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: metaplatform-api/package-lock.json
      - run: cd metaplatform-api && npm ci
      - name: Wait for backends
        run: |
          for port in 5432 6379 7687 9200 9000 9092 8123; do
            echo "Waiting for port $port..."
            for i in {1..60}; do
              nc -z localhost $port && break || sleep 2
            done
          done
          echo "All backends up"
      - name: Start API server
        run: |
          cd metaplatform-api
          (npm start &> /tmp/api.log &)
          for i in {1..30}; do
            curl -sf http://localhost:3001/api/health && break || sleep 2
          done
      - name: Run Phase 1-5 integration smoke tests
        run: |
          set -e
          echo "--- Health ---"
          curl -sf http://localhost:3001/api/health
          echo ""
          echo "--- Storage ---"
          curl -sf http://localhost:3001/api/storage/health | head -c 500
          echo ""
          echo "--- AI ---"
          curl -sf http://localhost:3001/api/ai/status | head -c 500
          echo ""
          echo "--- Analytics ---"
          curl -sf http://localhost:3001/api/analytics/status | head -c 500
          echo ""
          echo "--- Observability metrics ---"
          n=$(curl -sf http://localhost:3001/api/observability/metrics | grep -c '^metaplatform_')
          echo "metaplatform_ metric lines: $n"
          [ "$n" -gt 10 ]
          echo "--- OpenAPI ---"
          n=$(curl -sf http://localhost:3001/api/openapi.json | python -c "import sys,json; d=json.load(sys.stdin); print(len(d['paths']))")
          echo "OpenAPI paths: $n"
          [ "$n" -gt 50 ]
          echo "All smoke tests passed"

  # ─── 3. K8s manifest validation ─────────────────────────────
  k8s-validate:
    name: K8s manifests + Helm chart validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: python deploy/scripts/validate-k8s.py .

  # ─── 4. Frontend build ─────────────────────────────────────
  frontend-build:
    name: Frontend build (Vite + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: metaplatform-frontend/package-lock.json
      - run: cd metaplatform-frontend && npm ci
      - run: cd metaplatform-frontend && npx tsc --noEmit
      - run: cd metaplatform-frontend && npm run build

  # ─── 5. Docker images (main only) ─────────────────────────
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration, frontend-build, k8s-validate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./metaplatform-api
          file: ./metaplatform-api/Dockerfile
          push: false
          tags: metaplatform/api:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./metaplatform-frontend
          file: ./metaplatform-frontend/Dockerfile
          push: false
          tags: metaplatform/frontend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Aggregate gate ───────────────────────────────────────
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration, k8s-validate, frontend-build]
    if: success()
    steps:
      - run: echo "✓ All checks passed"