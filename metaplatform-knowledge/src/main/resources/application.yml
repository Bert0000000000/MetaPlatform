server:
  port: 8095

spring:
  application:
    name: metaplatform-knowledge
  datasource:
    url: jdbc:postgresql://localhost:5432/metaplatform_knowledge
    username: metaplatform
    password: ${DB_PASSWORD:metaplatform}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

metaplatform:
  rag:
    ai-substrate:
      base-url: http://localhost:8090
      embedding-path: /api/v1/embeddings
      vector-search-path: /api/v1/vector/search
    default-chunk-size: 512
    default-chunk-overlap: 50
    max-top-k: 20
  mdm:
    match-threshold: 80
    auto-merge-threshold: 95
  storage:
    base-path: /data/metaplatform/documents

logging:
  level:
    com.metaplatform.ragmdm: DEBUG
