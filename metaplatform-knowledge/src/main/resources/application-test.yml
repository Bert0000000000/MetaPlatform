spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

metaplatform:
  rag:
    ai-substrate:
      base-url: http://localhost:9999
      embedding-path: /api/v1/embeddings
      vector-search-path: /api/v1/vector/search
    default-chunk-size: 512
    default-chunk-overlap: 50
    max-top-k: 20
  mdm:
    match-threshold: 80
    auto-merge-threshold: 95
  storage:
    base-path: ${java.io.tmpdir}/metaplatform-test
