version: "3.8"

services:
  # ── PostgreSQL (primary DB) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mp-postgres
    environment:
      POSTGRES_DB: metaplatform
      POSTGRES_USER: mp
      POSTGRES_PASSWORD: mp_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp -d metaplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (cache + pub/sub) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Neo4j (graph DB — Phase 2) ───────────────────────
  neo4j:
    image: neo4j:5.20
    container_name: mp-neo4j
    environment:
      NEO4J_AUTH: neo4j/metaplatform2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4jdata:/data

  # ── Elasticsearch (full-text search — Phase 2) ───────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: mp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  # ── MinIO (object storage — Phase 2) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: mp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: metaplatform
      MINIO_ROOT_PASSWORD: metaplatform_secret_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ── Kafka (event bus — Phase 2) ──────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: mp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/var/lib/kafka/data

  # ── Flowable BPMN Engine (process orchestration) ───────────
  flowable-rest:
    image: flowable/flowable-rest:8.0.0
    container_name: mp-flowable-rest
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:flowable;DB_CLOSE_DELAY=-1
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      # flowable.rest.app is the prefix for RestAppProperties
      # (verified by inspecting RestAppProperties.class in /app.war).
      # Security is always on; basic auth admin is seeded from these vars
      # by BootstrapConfiguration#initDefaultAdminUserAndPrivilegesRunner
      # on first boot when no admin user exists.
      - FLOWABLE_REST_APP_ADMIN_USER_ID=admin
      - FLOWABLE_REST_APP_ADMIN_PASSWORD=test
      - SERVER_PORT=8080
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/flowable-rest/service/management/engine || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── ClickHouse (analytics OLAP — Phase 3) ─────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: mp-clickhouse
    environment:
      CLICKHOUSE_DB: metaplatform
      CLICKHOUSE_USER: meta
      CLICKHOUSE_PASSWORD: metaplatform2026
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhousedata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MetaPlatform API ────────────────────────────────
  api:
    build:
      context: ./metaplatform-api
      dockerfile: Dockerfile
    container_name: mp-api
    environment:
      DATABASE_URL: postgres://mp:mp_secret_2026@postgres:5432/metaplatform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: metaplatform-prod-secret-change-in-production
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: metaplatform2026
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: metaplatform
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: metaplatform
      MINIO_SECRET_KEY: metaplatform_secret_2026
      MINIO_BUCKET: metaplatform
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: metaplatform-api
      KAFKA_GROUP_ID: metaplatform-api-consumers
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: meta
      CLICKHOUSE_PASSWORD: metaplatform2026
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # ── MetaPlatform Frontend ───────────────────────────
  frontend:
    build:
      context: ./metaplatform-frontend
      dockerfile: Dockerfile
    container_name: mp-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  esdata:
  miniodata:
  kafkadata:
  clickhousedata: