version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: mp-postgres
    environment:
      POSTGRES_DB: metaplatform
      POSTGRES_USER: mp
      POSTGRES_PASSWORD: mp_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp -d metaplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mp-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./metaplatform-api
      dockerfile: Dockerfile
    container_name: mp-api
    environment:
      DATABASE_URL: postgres://mp:mp_secret_2026@postgres:5432/metaplatform
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./metaplatform-frontend
      dockerfile: Dockerfile
    container_name: mp-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
